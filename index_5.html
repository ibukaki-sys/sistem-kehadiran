// ─── QRGen: renders QR into a div, canvas accessible via wrapRef ───
function QRGen({data,size=200,wrapRef}){
  const localRef=useRef();
  const ref=wrapRef||localRef;
  useEffect(()=>{
    if(!ref.current||!window.QRCode||!data)return;
    ref.current.innerHTML='';
    window.QRCode.toCanvas(
      document.createElement('canvas'), // dummy
      data,{width:size,margin:2,color:{dark:'#085041',light:'#ffffff'}},
      ()=>{}
    );
    // Use toDataURL approach for reliable rendering
    ref.current.innerHTML='';
    const c=document.createElement('canvas');
    ref.current.appendChild(c);
    window.QRCode.toCanvas(c,data,{width:size,margin:2,color:{dark:'#085041',light:'#ffffff'}},()=>{});
  },[data,size]);
  return <div ref={ref} style={{lineHeight:0}}/>;
}

// ─── Download: styled PNG with school branding ───
function downloadQRImage(prog,qrWrapEl){
  const canvas=qrWrapEl?.querySelector('canvas');
  if(!canvas){alert('QR belum dijana. Sila tunggu sebentar.');return;}
  const W=440,H=560;
  const c=document.createElement('canvas');
  c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  // White bg
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,W,H);
  // Navy header
  ctx.fillStyle='#1e3a5f';
  ctx.fillRect(0,0,W,70);
  // Header text
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.font='10px Arial';
  ctx.textAlign='center';
  ctx.fillText(SCHOOL.toUpperCase(),W/2,22);
  ctx.fillStyle='#ffffff';
  ctx.font='bold 14px Arial';
  ctx.fillText('SISTEM KEHADIRAN PROGRAM',W/2,46);
  ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.font='10px Arial';
  ctx.fillText('Scan kod QR untuk daftar kehadiran',W/2,62);
  // QR image
  const qSize=280;
  const qX=(W-qSize)/2;
  ctx.drawImage(canvas,qX,86,qSize,qSize);
  // Teal accent bar between QR and info
  ctx.fillStyle=T;
  ctx.fillRect(qX,86+qSize+8,qSize,3);
  // Info section bg
  ctx.fillStyle='#f9fafb';
  ctx.fillRect(0,86+qSize+20,W,H-(86+qSize+20));
  // Program name
  ctx.fillStyle='#111827';
  ctx.font='bold 16px Arial';
  ctx.textAlign='center';
  const nm=prog.nama.length>38?prog.nama.slice(0,35)+'…':prog.nama;
  ctx.fillText(nm,W/2,86+qSize+50);
  // Venue
  ctx.fillStyle='#6b7280';
  ctx.font='12px Arial';
  ctx.fillText(prog.tempat,W/2,86+qSize+72);
  // Date
  const ds=`${HR[prog.hari]}, ${fd(prog.tarikh)}`;
  ctx.fillText(ds,W/2,86+qSize+92);
  // Dotted separator
  ctx.setLineDash([3,3]);
  ctx.strokeStyle='#d1d5db';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(40,86+qSize+108);
  ctx.lineTo(W-40,86+qSize+108);
  ctx.stroke();
  ctx.setLineDash([]);
  // Bottom instruction
  ctx.fillStyle='#9ca3af';
  ctx.font='10px Arial';
  ctx.fillText('Imbas menggunakan apl Sistem Kehadiran Program',W/2,86+qSize+128);
  // Green footer
  ctx.fillStyle=T;
  ctx.fillRect(0,H-6,W,6);
  // Border
  ctx.strokeStyle='#e5e7eb';
  ctx.lineWidth=1;
  ctx.strokeRect(.5,.5,W-1,H-1);

  const link=document.createElement('a');
  link.download=`QR-${prog.nama.replace(/\s+/g,'-')}.png`;
  link.href=c.toDataURL('image/png');
  link.click();
}

// ─── QR Scanner ───
function QRScanner({onScan,onCancel}){
  const vR=useRef(),cR=useRef(),rafR=useRef(),stR=useRef();
  const [st,setSt]=useState('init');
  useEffect(()=>{
    (async()=>{
      try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
        stR.current=s;if(vR.current){vR.current.srcObject=s;await vR.current.play();setSt('ok');tick();}}
      catch{setSt('err');}
    })();
    return()=>{cancelAnimationFrame(rafR.current);stR.current?.getTracks().forEach(t=>t.stop());};
  },[]);
  function tick(){
    const v=vR.current,c=cR.current;
    if(!v||!c){rafR.current=requestAnimationFrame(tick);return;}
    if(v.readyState===v.HAVE_ENOUGH_DATA&&window.jsQR){
      c.width=v.videoWidth;c.height=v.videoHeight;
      const ctx=c.getContext('2d');ctx.drawImage(v,0,0);
      const img=ctx.getImageData(0,0,c.width,c.height);
      const res=window.jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(res){stR.current?.getTracks().forEach(t=>t.stop());onScan(res.data);return;}
    }
    rafR.current=requestAnimationFrame(tick);
  }
  return(
    <div style={{position:'relative'}}>
      <video ref={vR} playsInline muted style={{width:'100%',borderRadius:14,display:st==='ok'?'block':'none'}}/>
      <canvas ref={cR} style={{display:'none'}}/>
      {st==='init'&&<div style={{padding:48,textAlign:'center',color:'#6b7280',fontSize:14}}>Membuka kamera...</div>}
      {st==='err'&&<div style={{padding:32,textAlign:'center'}}>
        <i className="ti ti-camera-off" style={{fontSize:40,color:'#9ca3af',display:'block',marginBottom:10}}/>
        <div style={{fontSize:14,color:'#6b7280'}}>Kamera tidak boleh diakses.</div>
        <div style={{fontSize:13,color:'#9ca3af',marginTop:4}}>Pilih program secara manual di bawah.</div>
      </div>}
      {st==='ok'&&<div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:190,height:190,border:`3px solid ${T}`,borderRadius:14,pointerEvents:'none'}}/>}
      <button onClick={onCancel} style={{marginTop:12,width:'100%',background:'#f3f4f6',border:'none',padding:'13px',borderRadius:11,cursor:'pointer',fontSize:14,color:'#374151',fontWeight:500}}>Batal</button>
    </div>
  );
}

                  <tr key={s.id} className="hr" style={{borderTop:i>0?'1px solid #f3f4f6':'none'}}>

            </div>
          }
        </div>
      </div>
    );
  }

  /* ── Program ── */

    return(
      <div style={{animation:'fadeUp .2s ease'}}>
        <button onClick={()=>setSub(null)} style={{background:'none',border:'none',cursor:'pointer',color:T,padding:'0 0 12px',display:'flex',alignItems:'center',gap:5,fontSize:13}}>
          <i className="ti ti-arrow-left"/> Kembali
        </button>
        <div style={{display:'grid',gridTemplateColumns:'195px 1fr',gap:16,alignItems:'start'}}>
          <div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:3,color:'#111827'}}>{selP.nama}</div>
            <div style={{fontSize:12,color:'#6b7280',marginBottom:1}}>{selP.tempat}</div>
            <div style={{fontSize:12,color:'#6b7280',marginBottom:14}}>{HR[selP.hari]}, {fd(selP.tarikh)}</div>
            {[{l:'Jumlah Hadir',v:recs.length,bg:TL,col:T,tc:TD},...BAH.map((b,i)=>({l:b,v:recs.filter(r=>r.bah===i).length,bg:'#f9fafb',col:'#111827',tc:'#6b7280'}))].map((x,i)=>(
              <div key={i} style={{background:x.bg,borderRadius:9,padding:'9px 12px',marginBottom:7,border:i===0?`1px solid ${T}30`:'1px solid #e5e7eb'}}>
                <div style={{fontSize:21,fontWeight:700,color:x.col}}>{x.v}</div>
                <div style={{fontSize:11,color:x.tc}}>{x.l}</div>
              </div>
            ))}
            <button onClick={()=>{setQrSel(selP);goTab('qrkod');}} style={{width:'100%',background:TL,color:TD,border:`1px solid ${T}30`,borderRadius:8,padding:'8px',cursor:'pointer',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:5,marginTop:4}}>
              <i className="ti ti-qrcode"/>Jana Kod QR
            </button>
          </div>
          {recs.length===0
            ?<div style={{textAlign:'center',padding:'28px',color:'#9ca3af',border:'1px solid #e5e7eb',borderRadius:10}}>
              <i className="ti ti-users" style={{fontSize:30,display:'block',marginBottom:6}}/>Tiada rekod kehadiran
            </div>
            :<div style={{border:'1px solid #e5e7eb',borderRadius:10,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,tableLayout:'fixed'}}>
                <thead><tr style={{background:'#f9fafb'}}>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b7280',width:28}}>#</th>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b7280'}}>Nama</th>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b7280',width:90}}>Bahagian</th>
                  <th style={{padding:'7px 10px',textAlign:'right',fontWeight:600,fontSize:11,color:'#6b7280',width:54}}>Masa</th>
                </tr></thead>
                <tbody>{recs.map((r,i)=>(
                  <tr key={r.id} style={{borderTop:i>0?'1px solid #f3f4f6':'none'}}>
                    <td style={{padding:'8px 10px',color:'#9ca3af',fontSize:11}}>{i+1}</td>
                    <td style={{padding:'8px 10px',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#111827'}}>{r.nama}</td>
                    <td style={{padding:'8px 10px'}}><Bdg l={BAH[r.bah]} i={r.bah}/></td>
                    <td style={{padding:'8px 10px',textAlign:'right',color:'#6b7280',fontSize:12}}>{ft(r.masa)}</td>
                  </tr>
                ))}
              </tbody></table>
            </div>
          }
        </div>
      </div>
    );
  }

  function Program(){
    if(sub==='rep'&&selP)return <ProgRep/>;
    const sorted=[...progs].sort((a,b)=>b.cAt-a.cAt);
    return(
      <div style={{animation:'fadeUp .2s ease',display:'grid',gridTemplateColumns:'290px 1fr',gap:18,alignItems:'start'}}>
        <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:10,padding:16}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:13,paddingBottom:10,borderBottom:'1px solid #f3f4f6',color:'#374151'}}>Tambah Program Baharu</div>
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {sIn('Nama program',pf.nama,e=>setPf(f=>({...f,nama:e.target.value})))}
            {sIn('Tempat',pf.tempat,e=>setPf(f=>({...f,tempat:e.target.value})))}
            <input type="date" value={pf.tarikh} onChange={e=>setPf(f=>({...f,tarikh:e.target.value}))}/>
            {sSel(pf.hari,e=>setPf(f=>({...f,hari:e.target.value})),HR.map((h,i)=><option key={i} value={i}>{h}</option>))}
            {pErr&&<div style={{fontSize:12,color:'#dc2626'}}>{pErr}</div>}
            {pOk&&<div style={{fontSize:12,color:T}}>{pOk}</div>}
            {iBtn(addPr,'plus','Tambah Program')}
          </div>
        </div>
        <div>
          {sLbl(`${progs.length} Program`)}
          {sorted.length===0
            ?<div style={{textAlign:'center',padding:'36px',color:'#9ca3af',border:'1px solid #e5e7eb',borderRadius:10}}>
              <i className="ti ti-calendar" style={{fontSize:34,display:'block',marginBottom:8}}/>Tiada program
            </div>
            :<div style={{border:'1px solid #e5e7eb',borderRadius:10,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,tableLayout:'fixed'}}>
                <thead><tr style={{background:'#f9fafb'}}>
                  <th style={{padding:'8px 11px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b7280',width:'26%'}}>Program</th>
                  <th style={{padding:'8px 11px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b7280',width:'20%'}}>Tempat</th>
                  <th style={{padding:'8px 11px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b7280',width:'22%'}}>Tarikh</th>
                  <th style={{padding:'8px 11px',textAlign:'center',fontWeight:600,fontSize:11,color:'#6b7280',width:52}}>Hadir</th>
                  <th style={{padding:'8px 11px',width:104}}></th>
                </tr></thead>
                <tbody>{sorted.map((p,i)=>{const cnt=att.filter(a=>a.pId===p.id).length;return(
                  <tr key={p.id} className="hr" style={{borderTop:i>0?'1px solid #f3f4f6':'none'}}>
                    <td style={{padding:'9px 11px',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#111827'}}>{p.nama}</td>
                    <td style={{padding:'9px 11px',color:'#6b7280',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.tempat}</td>
                    <td style={{padding:'9px 11px',color:'#6b7280',fontSize:12}}>{HR[p.hari]}, {fds(p.tarikh)}</td>
                    <td style={{padding:'9px 11px',textAlign:'center'}}>
                      <span style={{background:TL,color:TD,padding:'2px 9px',borderRadius:99,fontWeight:600,fontSize:12}}>{cnt}</span>
                    </td>
                    <td style={{padding:'7px 9px'}}>
                      <div style={{display:'flex',gap:4,justifyContent:'flex-end'}}>
                        <button onClick={()=>{setQrSel(p);goTab('qrkod');}} style={{background:TL,border:'none',borderRadius:6,padding:'5px 8px',cursor:'pointer',color:TD,fontSize:12,display:'flex',alignItems:'center',gap:3,fontWeight:500}}>
                          <i className="ti ti-qrcode"/>QR
                        </button>
                        <button onClick={()=>{setSelP(p);setSub('rep');}} style={{background:'#f3f4f6',border:'none',borderRadius:6,padding:'5px 8px',cursor:'pointer',fontSize:12}}>
                          <i className="ti ti-list"/>
                        </button>
                        <button onClick={()=>delPr(p.id)} style={{background:'none',border:'none',borderRadius:6,padding:'5px 6px',cursor:'pointer',color:'#9ca3af',fontSize:12}}>
                          <i className="ti ti-trash"/>
                        </button>
                      </div>
                    </td>
                  </tr>
                );})}
              </tbody></table>
            </div>
          }
        </div>
      </div>
    );
  }

  /* ── JANA KOD QR TAB ── */
  function QRKod(){
    const sorted=[...progs].sort((a,b)=>b.cAt-a.cAt);
    const selected=qrSel||sorted[0]||null;
    const qrData=selected?`HADIR:${selected.id}`:null;
    const cnt=selected?att.filter(a=>a.pId===selected.id).length:0;

    // auto-select first when tab opens
    useEffect(()=>{
      if(!qrSel&&sorted.length>0)setQrSel(sorted[0]);
    },[]);

    if(progs.length===0)return(
      <div style={{textAlign:'center',padding:'60px 0',color:'#9ca3af',animation:'fadeUp .2s ease'}}>
        <i className="ti ti-qrcode-off" style={{fontSize:48,display:'block',marginBottom:12}}/>
        <div style={{fontSize:16,fontWeight:600,marginBottom:6,color:'#374151'}}>Tiada Program</div>
        <div style={{fontSize:14,marginBottom:16}}>Tambah program dahulu sebelum menjana kod QR.</div>
        <button onClick={()=>goTab('program')} style={{background:T,color:'#fff',border:'none',padding:'9px 20px',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14,display:'inline-flex',alignItems:'center',gap:6}}>
          <i className="ti ti-plus"/>Tambah Program
        </button>
      </div>
    );

    return(
      <div style={{animation:'fadeUp .2s ease',display:'grid',gridTemplateColumns:'230px 1fr',gap:0,minHeight:480}}>
        {/* Left: program list */}
        <div style={{borderRight:'1px solid #e5e7eb',paddingRight:0}}>
          <div style={{padding:'0 14px 10px',fontSize:11,fontWeight:600,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.06em'}}>
            Pilih Program
          </div>
          <div style={{overflowY:'auto',maxHeight:500}}>
            {sorted.map(p=>{
              const isSel=selected?.id===p.id;
              const c2=att.filter(a=>a.pId===p.id).length;
              return(
                <div key={p.id} onClick={()=>setQrSel(p)}
                  style={{padding:'11px 14px',cursor:'pointer',borderLeft:`3px solid ${isSel?T:'transparent'}`,background:isSel?TL:'transparent',transition:'all .15s',borderBottom:'1px solid #f3f4f6'}}>
                  <div style={{fontWeight:isSel?600:500,fontSize:13,color:isSel?TD:'#111827',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.nama}</div>
                  <div style={{fontSize:11,color:isSel?TD:'#9ca3af'}}>{HR[p.hari]}, {fds(p.tarikh)}</div>
                  <div style={{fontSize:11,color:isSel?T:'#9ca3af',marginTop:2,fontWeight:isSel?600:400}}>{c2} hadir</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Right: QR display panel */}
        {selected&&(
          <div style={{padding:'0 0 0 24px',display:'flex',flexDirection:'column',gap:16}}>
            {/* Program info banner */}
            <div style={{background:`linear-gradient(135deg,${NV} 0%,#2d5a8e 100%)`,borderRadius:12,padding:'16px 18px',color:'#fff'}}>
              <div style={{fontSize:10,color:'rgba(255,255,255,.5)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:4}}>{SCHOOL}</div>
              <div style={{fontSize:16,fontWeight:700,marginBottom:5}}>{selected.nama}</div>
              <div style={{display:'flex',gap:14,fontSize:12,color:'rgba(255,255,255,.7)'}}>
                <span><i className="ti ti-map-pin" style={{fontSize:11,marginRight:3}}/>{selected.tempat}</span>
                <span><i className="ti ti-calendar" style={{fontSize:11,marginRight:3}}/>{HR[selected.hari]}, {fds(selected.tarikh)}</span>
                <span><i className="ti ti-users" style={{fontSize:11,marginRight:3}}/>{cnt} hadir</span>
              </div>
            </div>

            {/* QR Code */}
            <div style={{display:'flex',gap:20,alignItems:'flex-start'}}>
              <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:14,padding:18,display:'inline-block',boxShadow:'0 4px 20px rgba(0,0,0,.06)',flexShrink:0}}>
                <QRGen data={qrData} size={220} wrapRef={qrWrapRef}/>
                <div style={{marginTop:10,textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#9ca3af',marginBottom:2}}>ID Program</div>
                  <code style={{fontSize:10,background:'#f3f4f6',padding:'2px 7px',borderRadius:4,color:'#374151'}}>{selected.id}</code>
                </div>
              </div>

              {/* Instructions + Actions */}
              <div style={{flex:1}}>
                <div style={{background:'#f9fafb',border:'1px solid #e5e7eb',borderRadius:10,padding:'14px 16px',marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#374151',marginBottom:8}}>Cara Penggunaan</div>
                  {[
                    ['1','Buka apl pada telefon kakitangan'],
                    ['2','Pilih peranan Kakitangan'],
                    ['3','Tekan butang Imbas Kod QR'],
                    ['4','Arahkan kamera ke kod QR ini'],
                    ['5','Masukkan No. KP untuk daftar hadir'],
                  ].map(([n,t])=>(
                    <div key={n} style={{display:'flex',gap:9,alignItems:'flex-start',marginBottom:7}}>
                      <div style={{width:20,height:20,borderRadius:'50%',background:T,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,flexShrink:0}}>{n}</div>
                      <div style={{fontSize:12,color:'#374151',paddingTop:1}}>{t}</div>
                    </div>
                  ))}
                </div>

                {/* Action buttons */}
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <button onClick={()=>downloadQRImage(selected,qrWrapRef.current)}
                    style={{width:'100%',background:T,color:'#fff',border:'none',padding:'11px 16px',borderRadius:9,cursor:'pointer',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:7,boxShadow:'0 2px 12px rgba(29,158,117,.25)'}}>
                    <i className="ti ti-download" style={{fontSize:17}}/>Muat Turun QR (PNG)
                  </button>
                  <button onClick={()=>printQR(selected,qrWrapRef.current)}
                    style={{width:'100%',background:'#fff',color:NV,border:`1.5px solid ${NV}`,padding:'11px 16px',borderRadius:9,cursor:'pointer',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
                    <i className="ti ti-printer" style={{fontSize:17}}/>Cetak Kod QR
                  </button>
                  <button onClick={()=>{setSelP(selected);setSub('rep');setTab('program');}}
                    style={{width:'100%',background:'#f3f4f6',color:'#374151',border:'1px solid #e5e7eb',padding:'9px 16px',borderRadius:9,cursor:'pointer',fontWeight:500,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                    <i className="ti ti-clipboard-list"/>Lihat Senarai Kehadiran
                  </button>
                </div>

                <div style={{marginTop:12,fontSize:11,color:'#9ca3af',lineHeight:1.5}}>
                  <i className="ti ti-info-circle" style={{marginRight:4}}/>
                  Fail PNG yang dimuat turun mengandungi QR kod berserta maklumat program dan nama sekolah — sesuai untuk dicetak atau dikongsi.
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ── Laporan ── */
  function Laporan(){
    const cur=repP?progs.find(p=>p.id===repP):null;
    const recs=cur?[...att.filter(a=>a.pId===cur.id)].sort((a,b)=>a.masa-b.masa):[];
    return(
      <div style={{animation:'fadeUp .2s ease'}}>
        <div style={{marginBottom:14}}>
          <select value={repP} onChange={e=>setRepP(e.target.value)} style={{width:'auto',minWidth:300}}>
            <option value="">-- Pilih Program --</option>
            {progs.map(p=><option key={p.id} value={p.id}>{p.nama} · {fds(p.tarikh)}</option>)}
          </select>
        </div>
        {cur&&<div style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:14,alignItems:'start'}}>
          <div>
            <div style={{background:'#f9fafb',borderRadius:10,padding:12,marginBottom:9,border:'1px solid #e5e7eb'}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:3,color:'#111827'}}>{cur.nama}</div>
              <div style={{fontSize:12,color:'#6b7280',marginBottom:1}}>{cur.tempat}</div>
              <div style={{fontSize:12,color:'#6b7280'}}>{HR[cur.hari]}, {fd(cur.tarikh)}</div>
            </div>
            {[{l:'Jumlah',v:recs.length,bg:TL,col:T,tc:TD},...BAH.map((b,i)=>({l:b,v:recs.filter(r=>r.bah===i).length,bg:'#f9fafb',col:'#111827',tc:'#6b7280'}))].map((x,i)=>(
              <div key={i} style={{background:x.bg,borderRadius:9,padding:'9px 12px',marginBottom:7,border:i===0?`1px solid ${T}30`:'1px solid #e5e7eb'}}>
                <div style={{fontSize:21,fontWeight:700,color:x.col}}>{x.v}</div>
                <div style={{fontSize:11,color:x.tc}}>{x.l}</div>
              </div>

          </div>
          <div style={{border:'1px solid #e5e7eb',borderRadius:10,overflow:'hidden'}}>
            {recs.length===0
              ?<div style={{padding:28,textAlign:'center',color:'#9ca3af'}}>Tiada rekod kehadiran untuk program ini</div>
              :<table style={{width:'100%',borderCollapse:'collapse',fontSize:13,tableLayout:'fixed'}}>
                <thead><tr style={{background:'#f9fafb'}}>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b7280',width:28}}>#</th>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b7280'}}>Nama</th>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b7280',width:100}}>No. KP</th>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b7280',width:90}}>Bahagian</th>
                  <th style={{padding:'7px 10px',textAlign:'right',fontWeight:600,fontSize:11,color:'#6b7280',width:52}}>Masa</th>
                </tr></thead>
                <tbody>{recs.map((r,i)=>(
                  <tr key={r.id} className="hr" style={{borderTop:i>0?'1px solid #f3f4f6':'none'}}>
                    <td style={{padding:'8px 10px',color:'#9ca3af',fontSize:11}}>{i+1}</td>
                    <td style={{padding:'8px 10px',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#111827'}}>{r.nama}</td>
                    <td style={{padding:'8px 10px',fontFamily:'monospace',fontSize:11,color:'#6b7280'}}>{r.noKP}</td>
                    <td style={{padding:'8px 10px'}}><Bdg l={BAH[r.bah]} i={r.bah}/></td>
                    <td style={{padding:'8px 10px',textAlign:'right',color:'#6b7280',fontSize:12}}>{ft(r.masa)}</td>
                  </tr>
                ))}
              </tbody></table>
            }
          </div>
        </div>}
        {!cur&&progs.length===0&&<div style={{textAlign:'center',padding:'36px 0',color:'#9ca3af'}}>
          <i className="ti ti-chart-bar" style={{fontSize:36,display:'block',marginBottom:8}}/>Tiada data laporan
        </div>}
      </div>

  /* ── Tetapan ── */
  function Tetapan(){
    return(
      <div style={{animation:'fadeUp .2s ease',maxWidth:480}}>
        <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:10,padding:18,marginBottom:12}}>

          <div style={{fontSize:13,color:'#6b7280',marginBottom:12}}>PIN digunakan untuk melindungi akses ke panel admin. PIN lalai ialah <strong>1234</strong>.</div>
          <div style={{display:'flex',gap:8}}>
            <input type="password" placeholder="PIN baharu (4–8 digit)" value={nPin} maxLength={8} onChange={e=>setNPin(e.target.value.replace(/\D/g,''))} style={{flex:1}}/>
            {iBtn(doPin,'lock','Simpan')}
          </div>
          {pmErr&&<div style={{fontSize:12,color:'#dc2626',marginTop:7}}>{pmErr}</div>}
          {pmOk&&<div style={{fontSize:12,color:T,marginTop:7}}>{pmOk}</div>}
        </div>
        <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:10,padding:18}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4,color:'#111827'}}>Log Keluar Admin</div>
          <div style={{fontSize:13,color:'#6b7280',marginBottom:12}}>Kembali ke skrin pemilihan peranan.</div>
          <button onClick={onLogout} style={{display:'flex',alignItems:'center',gap:6,background:'#FEF2F2',color:'#991B1B',border:'1px solid #FECACA',padding:'8px 14px',borderRadius:8,cursor:'pointer',fontWeight:500,fontSize:13}}>
            <i className="ti ti-logout"/>Log Keluar
          </button>
        </div>
      </div>
    );
  }

  const renderTab=()=>{switch(tab){case'utama':return<Utama/>;case'kakitangan':return<Kakitangan/>;case'program':return<Program/>;case'qrkod':return<QRKod/>;case'laporan':return<Laporan/>;case'tetapan':return<Tetapan/>;default:return<Utama/>;}}
  const hdrTitle=sub==='rep'?`Kehadiran — ${selP?.nama||''}`:tabLabel[tab]||'';

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* Sidebar */}
      <div style={{width:196,flexShrink:0,background:NV,display:'flex',flexDirection:'column',minHeight:'100vh'}}>
        <div style={{padding:'16px 14px 13px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
          <div style={{fontSize:9,color:'rgba(255,255,255,.35)',letterSpacing:'.07em',textTransform:'uppercase'}}>SMK Haji Abdul Rahman Limbong</div>
          <div style={{fontSize:13,fontWeight:600,color:'#fff',marginTop:2,lineHeight:1.3}}>Sistem Kehadiran Program</div>
          <div style={{marginTop:7,display:'inline-flex',alignItems:'center',gap:4,background:'rgba(255,255,255,.11)',borderRadius:5,padding:'3px 7px'}}>
            <i className="ti ti-shield-check" style={{fontSize:10,color:'rgba(255,255,255,.6)'}}/>
            <span style={{fontSize:10,color:'rgba(255,255,255,.6)',fontWeight:600}}>ADMIN</span>
          </div>
        </div>
        <div style={{padding:'9px 7px',flex:1}}>
          {NAVS.map(n=>(
            <button key={n.id} className="ni" onClick={()=>goTab(n.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:8,background:tab===n.id?(n.id==='qrkod'?`${T}22`:'rgba(255,255,255,.13)'):'none',border:'none',borderRadius:7,padding:'9px 10px',cursor:'pointer',marginBottom:2,color:tab===n.id?(n.id==='qrkod'?TL:'#fff'):'rgba(255,255,255,.48)',textAlign:'left',fontSize:13,fontWeight:tab===n.id?600:400,borderLeft:tab===n.id&&n.id==='qrkod'?`2px solid ${T}`:'2px solid transparent'}}>
              <i className={`ti ti-${n.ic}`} style={{fontSize:17,flexShrink:0}}/>
              {n.l}
              {n.id==='qrkod'&&<span style={{marginLeft:'auto',background:T,color:'#fff',fontSize:9,fontWeight:700,padding:'1px 5px',borderRadius:99}}>QR</span>}
            </button>
          ))}
        </div>
        <div style={{padding:'9px 7px',borderTop:'1px solid rgba(255,255,255,.07)'}}>
          <button className="ni" onClick={onLogout} style={{width:'100%',display:'flex',alignItems:'center',gap:8,background:'none',border:'none',borderRadius:7,padding:'8px 10px',cursor:'pointer',color:'rgba(255,255,255,.33)',fontSize:12}}>
            <i className="ti ti-logout" style={{fontSize:15}}/>Log Keluar
          </button>
        </div>
      </div>
      {/* Content */}
      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'11px 20px',borderBottom:'1px solid #e5e7eb',background:'#fff',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:14,fontWeight:600,color:'#111827'}}>{hdrTitle}</div>
          <div style={{fontSize:11,color:'#9ca3af'}}>{new Date().toLocaleDateString('ms-MY',{day:'2-digit',month:'short',year:'numeric'})}</div>
        </div>
        <div style={{padding:'18px 20px 32px',flex:1,overflowY:'auto'}}>{renderTab()}</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════
   KAKITANGAN PANEL — MOBILE FIRST
═══════════════════════════════ */
function UserPanel({staff,progs,att,svAt,onLogout}){
  const [scanM,setScanM]=useState('idle');
  const [scanPr,setScanPr]=useState(null);
  const [ic,setIc]=useState('');
  const [icR,setIcR]=useState(null);

  const doScan=data=>{
    if(!data.startsWith('HADIR:'))return setScanM('qerr');
    const p=progs.find(p=>p.id===data.slice(6));
    if(!p)return setScanM('qerr');
    setScanPr(p);setIc('');setIcR(null);setScanM('verify');
  };
  const doVerify=async()=>{
    const s=staff.find(s=>s.noKP===ic.trim());
    if(!s)return setIcR({t:'nf'});
    if(att.find(a=>a.pId===scanPr.id&&a.sId===s.id))return setIcR({t:'dup',nama:s.nama});
    const rec={id:gId(),pId:scanPr.id,sId:s.id,nama:s.nama,bah:s.bah,noKP:s.noKP,masa:Date.now()};
    await svAt([...att,rec]);
    setIcR({t:'ok',nama:s.nama,bah:s.bah});setScanM('done');
  };

  const MHdr=({title,back})=>(
    <div style={{background:T,padding:'14px 16px 13px',display:'flex',alignItems:'center',gap:10}}>
      {back&&<button onClick={back} style={{background:'rgba(255,255,255,.18)',border:'none',borderRadius:8,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#fff',flexShrink:0}}>
        <i className="ti ti-arrow-left" style={{fontSize:18}}/>
      </button>}
      <div style={{flex:1}}>
        <div style={{fontSize:9,color:'rgba(255,255,255,.55)',letterSpacing:'.07em',textTransform:'uppercase'}}>SMK Haji Abdul Rahman Limbong</div>
        <div style={{fontSize:16,fontWeight:600,color:'#fff',marginTop:1}}>{title}</div>
      </div>
      <button onClick={onLogout} style={{background:'rgba(255,255,255,.15)',border:'none',borderRadius:7,padding:'5px 10px',cursor:'pointer',color:'rgba(255,255,255,.75)',fontSize:11,display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
        <i className="ti ti-switch-horizontal" style={{fontSize:12}}/>Tukar
      </button>
    </div>
  );

  if(scanM==='scanning')return(<div><MHdr title="Imbas Kod QR" back={()=>setScanM('idle')}/>
    <div style={{padding:'18px 16px'}}>
      <div style={{fontSize:14,color:'#6b7280',marginBottom:14,textAlign:'center'}}>Arahkan kamera ke kod QR program</div>
      <QRScanner onScan={doScan} onCancel={()=>setScanM('idle')}/>
    </div></div>);

  if(scanM==='verify'&&scanPr)return(<div><MHdr title="Daftar Kehadiran" back={()=>setScanM('idle')}/>
    <div style={{padding:'20px 16px'}}>
      <div style={{background:TL,borderRadius:14,padding:'15px',marginBottom:22,border:`1px solid ${T}30`}}>
        <div style={{fontWeight:600,color:TD,fontSize:16,marginBottom:2}}>{scanPr.nama}</div>
        <div style={{fontSize:13,color:TD,marginBottom:1}}><i className="ti ti-map-pin" style={{fontSize:12}}/> {scanPr.tempat}</div>
        <div style={{fontSize:13,color:TD,marginBottom:6}}><i className="ti ti-calendar" style={{fontSize:12}}/> {HR[scanPr.hari]}, {fd(scanPr.tarikh)}</div>
        <span style={{fontSize:12,color:TD,background:'rgba(255,255,255,.5)',borderRadius:7,padding:'3px 9px',display:'inline-flex',alignItems:'center',gap:4}}>
          <i className="ti ti-users" style={{fontSize:11}}/>{att.filter(a=>a.pId===scanPr.id).length} telah mendaftar hadir
        </span>
      </div>
      <div style={{fontSize:16,fontWeight:600,marginBottom:5,color:'#111827'}}>No. Kad Pengenalan</div>
      <div style={{fontSize:13,color:'#6b7280',marginBottom:12}}>Masukkan 12 digit No. KP anda tanpa sempang</div>
      <input placeholder="901231125432" value={ic} maxLength={12} inputMode="numeric"
        onChange={e=>{setIc(e.target.value.replace(/\D/g,''));setIcR(null);}}
        style={{fontSize:22,padding:'14px 16px',borderRadius:12,border:'1.5px solid #d1d5db',background:'#f9fafb',letterSpacing:3,marginBottom:12,textAlign:'center'}}/>
      <button onClick={doVerify} style={{width:'100%',background:T,color:'#fff',border:'none',padding:'15px',borderRadius:13,cursor:'pointer',fontWeight:600,fontSize:16,marginBottom:10}}>
        Daftar Hadir
      </button>
      {icR?.t==='nf'&&<div style={{background:'#FEF2F2',color:'#991B1B',padding:'13px 15px',borderRadius:12,fontSize:14,textAlign:'center',border:'1px solid #FECACA'}}>
        <i className="ti ti-alert-circle" style={{fontSize:20,display:'block',margin:'0 auto 5px'}}/>No KP tidak dijumpai dalam sistem.
      </div>}
      {icR?.t==='dup'&&<div style={{background:'#FFFBEB',color:'#92400E',padding:'13px 15px',borderRadius:12,fontSize:14,textAlign:'center',border:'1px solid #FDE68A'}}>
        <i className="ti ti-alert-triangle" style={{fontSize:20,display:'block',margin:'0 auto 5px'}}/>{icR.nama} sudah mendaftar hadir.
      </div>}
    </div></div>);

  if(scanM==='done'&&icR?.t==='ok')return(<div><MHdr title="Kehadiran Direkod"/>
    <div style={{padding:'32px 18px 24px',textAlign:'center',animation:'popIn .35s ease'}}>
      <div style={{width:86,height:86,borderRadius:'50%',background:TL,color:T,display:'flex',alignItems:'center',justifyContent:'center',fontSize:46,margin:'0 auto 18px',border:`2px solid ${T}30`}}>
        <i className="ti ti-check"/>
      </div>
      <div style={{fontWeight:700,fontSize:24,marginBottom:7,color:'#111827'}}>Terima kasih!</div>
      <div style={{fontSize:21,color:T,fontWeight:600,marginBottom:5}}>{icR.nama}</div>
      <div style={{fontSize:15,color:'#6b7280',marginBottom:3}}>{BAH[icR.bah]}</div>
      <div style={{fontSize:14,color:'#6b7280',marginBottom:5}}>{scanPr?.nama}</div>
      <div style={{fontSize:12,background:'#f3f4f6',display:'inline-block',padding:'5px 14px',borderRadius:99,color:'#6b7280',marginBottom:28}}>
        <i className="ti ti-clock" style={{fontSize:12,marginRight:4}}/>{new Date().toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
      </div>
      <button onClick={()=>{setScanM('verify');setIc('');setIcR(null);}} style={{width:'100%',background:T,color:'#fff',border:'none',padding:'15px',borderRadius:13,cursor:'pointer',fontWeight:600,fontSize:16,marginBottom:10}}>
        Kakitangan Seterusnya
      </button>
      <button onClick={()=>setScanM('idle')} style={{width:'100%',background:'none',border:'none',color:'#9ca3af',padding:'9px',cursor:'pointer',fontSize:14}}>Pilih Program Lain</button>
    </div></div>);

  if(scanM==='qerr')return(<div><MHdr title="Ralat QR" back={()=>setScanM('idle')}/>
    <div style={{padding:'40px 20px',textAlign:'center'}}>
      <i className="ti ti-qrcode-off" style={{fontSize:56,color:'#EF4444',display:'block',marginBottom:12}}/>
      <div style={{fontWeight:600,fontSize:19,marginBottom:7,color:'#111827'}}>Kod QR Tidak Sah</div>
      <div style={{fontSize:14,color:'#6b7280',marginBottom:26}}>QR ini bukan untuk sistem ini</div>
      <button onClick={()=>setScanM('idle')} style={{background:T,color:'#fff',border:'none',padding:'13px 30px',borderRadius:12,cursor:'pointer',fontSize:15,fontWeight:600}}>Cuba Lagi</button>
    </div></div>);

  return(<div><MHdr title="Daftar Kehadiran"/>
    <div style={{padding:'20px 16px 32px'}}>
      <button onClick={()=>setScanM('scanning')} style={{width:'100%',background:T,border:'none',borderRadius:18,padding:'26px 18px',cursor:'pointer',textAlign:'center',marginBottom:18,display:'block',boxShadow:'0 4px 20px rgba(29,158,117,.3)'}}>
        <i className="ti ti-scan" style={{fontSize:50,color:'#fff',display:'block',margin:'0 auto 9px'}}/>
        <div style={{fontSize:19,fontWeight:600,color:'#fff',marginBottom:3}}>Imbas Kod QR</div>
        <div style={{fontSize:13,color:'rgba(255,255,255,.7)'}}>Buka kamera &amp; imbas kod QR program</div>
      </button>
      {progs.length>0&&<>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <div style={{flex:1,height:'1px',background:'#e5e7eb'}}/>
          <span style={{fontSize:13,color:'#9ca3af',flexShrink:0}}>atau pilih program</span>
          <div style={{flex:1,height:'1px',background:'#e5e7eb'}}/>
        </div>
        {progs.map(p=>{const cnt=att.filter(a=>a.pId===p.id).length;return(
          <button key={p.id} onClick={()=>{setScanPr(p);setIc('');setIcR(null);setScanM('verify');}}
            style={{width:'100%',background:'#fff',border:'1px solid #e5e7eb',borderRadius:14,padding:'15px',cursor:'pointer',textAlign:'left',marginBottom:9,display:'flex',justifyContent:'space-between',alignItems:'center',boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
            <div>
              <div style={{fontWeight:600,fontSize:15,marginBottom:2,color:'#111827'}}>{p.nama}</div>
              <div style={{fontSize:12,color:'#6b7280',marginBottom:1}}><i className="ti ti-map-pin" style={{fontSize:11}}/> {p.tempat}</div>
              <div style={{fontSize:12,color:'#6b7280'}}><i className="ti ti-calendar" style={{fontSize:11}}/> {HR[p.hari]}, {fds(p.tarikh)}</div>
            </div>
            <div style={{textAlign:'right',flexShrink:0,marginLeft:10}}>
              <div style={{fontSize:22,fontWeight:700,color:T}}>{cnt}</div>
              <div style={{fontSize:11,color:'#9ca3af'}}>hadir</div>
            </div>
          </button>
        );})}
      </>}
      {progs.length===0&&<div style={{textAlign:'center',padding:'24px 0',color:'#9ca3af',fontSize:14}}>Tiada program aktif. Hubungi pentadbir.</div>}
    </div></div>);
}

/* ═══════════════════════
   ROOT — LANDING + AUTH
═══════════════════════ */
function App(){
  const [role,setRole]=useState(null);
  const [staff,setStaff]=useState([]);
  const [progs,setProgs]=useState([]);
  const [att,setAtt]=useState([]);
  const [pin,setPin]=useState(DEF_PIN);
  const [rdy,setRdy]=useState(false);
  const [showPin,setShowPin]=useState(false);
  const [pinIn,setPinIn]=useState('');
  const [pinErr,setPinErr]=useState('');

  useEffect(()=>{
    (async()=>{
      await ld(SK.ST,setStaff);await ld(SK.PR,setProgs);await ld(SK.AT,setAtt);
      try{const v=localStorage.getItem(SK.PIN);if(v)setPin(JSON.parse(v));}catch{}
      setRdy(true);
    })();
  },[]);

  const svSt=async d=>{setStaff(d);await sv(SK.ST,d);};
  const svPr=async d=>{setProgs(d);await sv(SK.PR,d);};
  const svAt=async d=>{setAtt(d);await sv(SK.AT,d);};
  const updPin=async p=>{setPin(p);await sv(SK.PIN,p);};
  const tryAdmin=()=>{
    if(pinIn===pin){setRole('admin');setPinIn('');setPinErr('');}
    else{setPinErr('PIN tidak sah. Cuba lagi.');setPinIn('');}
  };

  if(!rdy)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',flexDirection:'column',gap:12}}>
      <div style={{width:32,height:32,border:`3px solid ${T}`,borderTopColor:'transparent',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>
      <span style={{color:'#6b7280',fontSize:14}}>Memuatkan sistem...</span>
    </div>
  );

  if(role==='admin')return <AdminPanel staff={staff} progs={progs} att={att} svSt={svSt} svPr={svPr} svAt={svAt} pin={pin} setPin={updPin} onLogout={()=>setRole(null)}/>;
  if(role==='user')return <UserPanel staff={staff} progs={progs} att={att} svAt={svAt} onLogout={()=>setRole(null)}/>;

  return(
    <div style={{minHeight:'100vh'}}>
      <div style={{background:`linear-gradient(150deg,${NV} 0%,#1a6648 100%)`,padding:'38px 24px 30px',textAlign:'center'}}>
        <div style={{width:64,height:64,borderRadius:18,background:'rgba(255,255,255,.17)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:30,margin:'0 auto 14px',color:'#fff'}}>
          <i className="ti ti-clipboard-list"/>
        </div>
        <div style={{fontSize:10,color:'rgba(255,255,255,.55)',letterSpacing:'.08em',textTransform:'uppercase'}}>{SCHOOL}</div>
        <div style={{fontSize:22,fontWeight:700,color:'#fff',marginTop:4}}>Sistem Kehadiran Program</div>
      </div>
      <div style={{padding:'26px 20px 36px',animation:'fadeUp .3s ease',maxWidth:480,margin:'0 auto'}}>
        <div style={{fontSize:13,color:'#6b7280',textAlign:'center',marginBottom:20}}>Pilih peranan anda untuk meneruskan</div>
        {!showPin?(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div onClick={()=>setShowPin(true)} style={{background:'#fff',border:`2px solid ${NV}`,borderRadius:16,padding:'20px 18px',cursor:'pointer',display:'flex',alignItems:'center',gap:14,boxShadow:'0 2px 8px rgba(30,58,95,.08)'}}>
              <div style={{width:52,height:52,borderRadius:14,background:BL,color:BD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,flexShrink:0}}><i className="ti ti-shield-lock"/></div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:16,marginBottom:3,color:BD}}>Admin</div>
                <div style={{fontSize:13,color:'#6b7280'}}>Urus kakitangan, program, laporan &amp; kod QR</div>
              </div>
              <i className="ti ti-chevron-right" style={{color:NV,fontSize:18,flexShrink:0}}/>
            </div>
            <div onClick={()=>setRole('user')} style={{background:'#fff',border:`2px solid ${T}`,borderRadius:16,padding:'20px 18px',cursor:'pointer',display:'flex',alignItems:'center',gap:14,boxShadow:'0 2px 8px rgba(29,158,117,.08)'}}>
              <div style={{width:52,height:52,borderRadius:14,background:TL,color:TD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,flexShrink:0}}><i className="ti ti-id-badge"/></div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:16,marginBottom:3,color:TD}}>Kakitangan</div>
                <div style={{fontSize:13,color:'#6b7280'}}>Imbas QR kod &amp; daftar kehadiran program</div>
              </div>
              <i className="ti ti-chevron-right" style={{color:T,fontSize:18,flexShrink:0}}/>
            </div>
          </div>
        ):(
          <div style={{animation:'fadeUp .2s ease'}}>
            <button onClick={()=>{setShowPin(false);setPinIn('');setPinErr('');}} style={{background:'none',border:'none',cursor:'pointer',color:T,padding:'0 0 16px',display:'flex',alignItems:'center',gap:5,fontSize:14}}>
              <i className="ti ti-arrow-left"/> Kembali
            </button>
            <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:16,padding:'22px 18px',boxShadow:'0 4px 16px rgba(0,0,0,.06)'}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18}}>
                <div style={{width:46,height:46,borderRadius:12,background:BL,color:BD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}><i className="ti ti-shield-lock"/></div>
                <div>
                  <div style={{fontWeight:600,fontSize:15,color:'#111827'}}>Log Masuk Admin</div>
                  <div style={{fontSize:13,color:'#6b7280'}}>Masukkan PIN untuk akses panel admin</div>
                </div>
              </div>
              <input type="password" inputMode="numeric" placeholder="Masukkan PIN" value={pinIn} maxLength={8}
                onChange={e=>{setPinIn(e.target.value.replace(/\D/g,''));setPinErr('');}}
                onKeyDown={e=>e.key==='Enter'&&tryAdmin()}
                style={{fontSize:24,padding:'13px 16px',borderRadius:11,border:'1.5px solid #d1d5db',background:'#f9fafb',textAlign:'center',letterSpacing:6,marginBottom:9}}/>
              {pinErr&&<div style={{fontSize:13,color:'#dc2626',textAlign:'center',marginBottom:9}}>{pinErr}</div>}
              <button onClick={tryAdmin} style={{width:'100%',background:NV,color:'#fff',border:'none',padding:'12px',borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
                <i className="ti ti-login"/>Log Masuk
              </button>
              <div style={{fontSize:12,color:'#9ca3af',textAlign:'center',marginTop:10}}>PIN lalai: <strong>1234</strong></div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
