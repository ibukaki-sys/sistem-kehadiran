  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    :root{
      --wine:#8B1A2E; --wine-l:#FDF0F2; --wine-m:#A82035; --wine-d:#5C001A;
      --bark:#2D0510; --bark2:#3D0A18;
      --page:#F9F4F5; --card:#FFFFFF;
      --border:#EDD8DC; --border2:#F7EDEF;
      --text:#1A0A0D; --muted:#7A4555; --dim:#C09AA8;
      --ok:#0F6B3D; --ok-l:#EEFAF3;
      --err:#B91C1C; --err-l:#FEF2F2;
      --warn-l:#FFFBEB;
      --r:12px; --r-s:8px; --r-xs:6px;
      --sh1:0 1px 3px rgba(0,0,0,.05);
      --sh2:0 4px 16px rgba(0,0,0,.07);
      --sh3:0 8px 36px rgba(139,26,46,.14);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',-apple-system,sans-serif;background:var(--page);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
    #root{max-width:980px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 80px rgba(139,26,46,.1)}
    input,select,button,textarea{font-family:'Outfit',sans-serif}
    input,select{
      display:block;width:100%;padding:10px 13px;
      border:1.5px solid var(--border);border-radius:var(--r-s);
      background:#fff;font-size:14px;color:var(--text);
      outline:none;transition:border-color .15s,box-shadow .15s;
    }
    input:focus,select:focus{border-color:var(--wine);box-shadow:0 0 0 3px rgba(139,26,46,.09);background:#fff}
    input::placeholder{color:var(--dim)}
    label.lbl{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
    .fld{display:flex;flex-direction:column;gap:5px}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:var(--r-s);cursor:pointer;font-weight:600;font-size:14px;transition:all .15s;border:none;padding:10px 18px}
    .btn:active{transform:scale(.97)}
    .btn-p{background:var(--wine);color:#fff;box-shadow:0 2px 10px rgba(139,26,46,.28)}
    .btn-p:hover{background:var(--wine-m);box-shadow:0 4px 18px rgba(139,26,46,.38)}
    .btn-o{background:transparent;color:var(--bark);border:1.5px solid var(--bark)}
    .btn-o:hover{background:var(--wine-l);border-color:var(--wine);color:var(--wine-d)}
    .btn-g{background:var(--wine-l);color:var(--wine-d);border:1px solid rgba(139,26,46,.15);font-size:13px;padding:9px 16px}
    .btn-g:hover{background:#fce4e8}
    .btn-dk{color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);font-size:12px;padding:7px 13px}
    .btn-dk:hover{background:rgba(255,255,255,.18);color:#fff}
    .btn-block{width:100%}
    .btn-sm{padding:7px 13px;font-size:12px;gap:5px}
    .btn-icon{padding:7px;border-radius:var(--r-xs);background:none;border:none;cursor:pointer;color:var(--dim);transition:all .15s}
    .btn-icon:hover{background:var(--wine-l);color:var(--wine-d)}

    /* Cards */
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
    .card-sh{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh2)}

    /* Tables */
    .tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
    .tbl th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;background:var(--wine-l);border-bottom:1.5px solid var(--border)}
    .tbl th:last-child{text-align:right}
    .tbl td{padding:10px 14px;border-top:1px solid var(--border2);vertical-align:middle}
    .tbl tbody tr{transition:background .1s}
    .tbl tbody tr:hover td{background:#fdf8f9;cursor:pointer}
    .tbl-r td:last-child{text-align:right}

    /* Section label */
    .sec{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px}

    /* Sidebar nav */
    .nav{width:100%;display:flex;align-items:center;gap:9px;background:none;border:none;border-radius:var(--r-s);padding:9px 11px;cursor:pointer;margin-bottom:2px;color:rgba(255,255,255,.4);text-align:left;font-size:13px;font-weight:400;border-left:2px solid transparent;transition:all .15s;font-family:'Outfit',sans-serif}
    .nav:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.75)}
    .nav.on{background:rgba(255,255,255,.11);color:#fff;font-weight:600;border-left-color:var(--wine)}
    .nav.qr.on{background:rgba(139,26,46,.38)}

    /* Alerts */
    .alert{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:var(--r-s);font-size:13px;line-height:1.5}
    .alert-err{background:var(--err-l);color:var(--err);border:1px solid #FECACA}
    .alert-ok{background:var(--ok-l);color:var(--ok);border:1px solid #A7F3D0}
    .alert-warn{background:var(--warn-l);color:#92400E;border:1px solid #FDE68A}
    .alert-info{background:var(--wine-l);color:var(--wine-d);border:1px solid rgba(139,26,46,.2)}

    /* Animations */
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
    @keyframes shimmer{from{opacity:.6}to{opacity:1}}

    /* Prog list item */
    .pi{padding:12px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;border-bottom:1px solid var(--border2)}
    .pi:hover{background:var(--wine-l);border-left-color:rgba(139,26,46,.3)}
    .pi.on{background:var(--wine-l);border-left-color:var(--wine)}
  </style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ── Constants ── */
const BG='#8B1A2E',BGL='#FDF0F2',BGD='#5C001A';
const BARK='#2D0510',BARK2='#3D0A18';
const BAH=['Pengurusan','Guru','Pentadbiran'];
const HR=['Ahad','Isnin','Selasa','Rabu','Khamis','Jumaat','Sabtu'];
const BC=[
  {bg:'#F0E8F6',col:'#5B1A6B',dot:'#8B3DAA'},
  {bg:'#FDF0F2',col:'#5C001A',dot:'#8B1A2E'},
  {bg:'#E8EEF8',col:'#0C2F7A',dot:'#2355C4'},
];
const SK={ST:'smk_st4',PR:'smk_pr4',AT:'smk_at4',PIN:'smk_pin4'};
const SCHOOL='SMK Haji Abdul Rahman Limbong';
const DEF_PIN='1234';

const gId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6).toUpperCase();
async function ld(k,s){try{const v=localStorage.getItem(k);if(v){s(JSON.parse(v));return true;}return false;}catch{return false;}}
async function sv(k,d){try{localStorage.setItem(k,JSON.stringify(d));}catch{}}
const fd=d=>new Date(d+'T00:00').toLocaleDateString('ms-MY',{day:'2-digit',month:'long',year:'numeric'});
const fds=d=>new Date(d+'T00:00').toLocaleDateString('ms-MY',{day:'2-digit',month:'short',year:'numeric'});
const ft=ts=>new Date(ts).toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit'});

/* Detect program from URL params */
function getProgramFromURL(){
  const p=new URLSearchParams(window.location.search);
  if(!p.get('p'))return null;
  return{id:p.get('p')||'',nama:decodeURIComponent(p.get('nm')||''),tempat:decodeURIComponent(p.get('tp')||''),tarikh:p.get('dt')||'',hari:parseInt(p.get('hr')||'0'),fromUrl:true};
}
function getBaseUrl(){
  const{origin,pathname}=window.location;
  return origin+pathname;
}

/* ── Shared UI ── */
function Bdg({l,i}){
  const c=BC[i%3];
  return(
    <span className="badge" style={{background:c.bg,color:c.col}}>
      <span style={{width:5,height:5,borderRadius:'50%',background:c.dot,display:'inline-block',marginRight:5}}/>
      {l}
    </span>
  );
}

function Field({label,children}){
  return(
    <div className="fld">
      {label&&<label className="lbl">{label}</label>}
      {children}
    </div>
  );
}

function StatCard({icon,label,value,color}){
  return(
    <div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'14px 16px',display:'flex',alignItems:'center',gap:12,boxShadow:'var(--sh1)'}}>
      <div style={{width:40,height:40,borderRadius:10,background:color+'15',color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
        <i className={`ti ti-${icon}`}/>
      </div>

/* ── QR display — uses embedded qrcodejs2, no CDN ── */
function QRGen({data,size=200,wrapRef}){
  const localRef=useRef();
  const ref=wrapRef||localRef;
  useEffect(()=>{
    if(!data||!ref.current)return;
    ref.current.innerHTML='';
    // qrcodejs2 is embedded — always available, no CDN needed
    new window.QRCode(ref.current,{
      text:data,
      width:size,
      height:size,
      colorDark:BARK,
      colorLight:'#ffffff',
      correctLevel:(window.QRCode&&window.QRCode.CorrectLevel)?window.QRCode.CorrectLevel.M:0,
    });
  },[data,size]);
  return<div ref={ref} style={{lineHeight:0,display:'flex',alignItems:'center',justifyContent:'center'}}/>;
}

/* Get QR canvas from QRGen wrapper.
   qrcodejs2 renders canvas synchronously, then may hide it (display:none)
   after converting to img. The canvas buffer is still readable even when hidden. */
function waitForQRCanvas(wrapRef){
  return new Promise((resolve,reject)=>{
    let tries=0;
    function check(){
      if(!wrapRef.current){if(++tries>80){reject(new Error('QR gagal dirender. Cuba lagi.'));return;}setTimeout(check,100);return;}
      // qrcodejs2 may hide canvas — but canvas.toDataURL() still works when hidden
      const canvas=wrapRef.current.querySelector('canvas');
      if(canvas&&canvas.width>0){resolve(canvas);return;}
      // Fallback: if img was created instead of canvas, draw img onto a new canvas
      const img=wrapRef.current.querySelector('img');
      if(img&&img.src&&img.src.startsWith('data:image')){
        const c=document.createElement('canvas');
        c.width=img.naturalWidth||200;c.height=img.naturalHeight||200;
        const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
        resolve(c);return;
      }
      if(++tries>80){reject(new Error('QR gagal dirender selepas 8 saat. Sila muat semula halaman.'));return;}
      setTimeout(check,100);
    }
    check();
  });
}

/* Download branded PNG — reads pixels from the already-rendered on-screen canvas */
function downloadQR(prog,srcCanvas){
  const W=480,H=620,pad=28;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const x=c.getContext('2d');
  /* Background */
  x.fillStyle='#fff';x.fillRect(0,0,W,H);
  /* Header */
  const grad=x.createLinearGradient(0,0,W,82);
  grad.addColorStop(0,BARK);grad.addColorStop(1,'#6b1020');
  x.fillStyle=grad;x.fillRect(0,0,W,82);
  x.fillStyle='rgba(255,255,255,.45)';x.font='600 9px Arial';x.textAlign='center';
  x.fillText(SCHOOL.toUpperCase(),W/2,20);
  x.fillStyle='#fff';x.font='bold 15px Arial';x.fillText('SISTEM KEHADIRAN PROGRAM',W/2,44);
  x.fillStyle='rgba(255,255,255,.35)';x.font='10px Arial';
  x.fillText('Imbas kod QR untuk mendaftar kehadiran',W/2,62);
  /* QR */
  const qs=280,qx=(W-qs)/2,qy=98;
  x.fillStyle='#f9f3f4';x.beginPath();x.roundRect(qx-14,qy-14,qs+28,qs+28,12);x.fill();
  x.drawImage(srcCanvas,qx,qy,qs,qs);
  /* Accent */
  x.fillStyle=BG;x.fillRect(qx,qy+qs+10,qs,3);
  /* Info */
  const iy=qy+qs+28;
  x.fillStyle='#1A0A0D';x.font='bold 17px Arial';x.textAlign='center';
  x.fillText(prog.nama.length>40?prog.nama.slice(0,37)+'…':prog.nama,W/2,iy+8);
  x.fillStyle='#7A4555';x.font='13px Arial';
  x.fillText(prog.tempat,W/2,iy+30);
  x.fillText(`${HR[prog.hari]}, ${fd(prog.tarikh)}`,W/2,iy+50);
  x.strokeStyle='#EDD8DC';x.setLineDash([4,4]);x.lineWidth=1;
  x.beginPath();x.moveTo(pad,iy+66);x.lineTo(W-pad,iy+66);x.stroke();x.setLineDash([]);
  x.fillStyle='#B8909A';x.font='10px Arial';
  x.fillText('Imbas dengan kamera telefon atau mana-mana apl QR scanner',W/2,iy+84);
  /* Footer */
  x.fillStyle=BG;x.fillRect(0,H-7,W,7);
  x.strokeStyle='#EDD8DC';x.lineWidth=1;x.strokeRect(.5,.5,W-1,H-1);
  /* Download */
  const a=document.createElement('a');
  a.download=`QR-${prog.nama.replace(/\s+/g,'-')}.png`;
  a.href=c.toDataURL('image/png');a.click();
}

/* ── QR Camera Scanner ── */
function QRScanner({onScan,onCancel}){
  const vR=useRef(),cR=useRef(),rafR=useRef(),stR=useRef();
  const [st,setSt]=useState('init');
  useEffect(()=>{
    (async()=>{
      try{
        const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
        stR.current=s;
        if(vR.current){vR.current.srcObject=s;await vR.current.play();setSt('ok');tick();}
      }catch{setSt('err');}
    })();
    return()=>{cancelAnimationFrame(rafR.current);stR.current?.getTracks().forEach(t=>t.stop());};
  },[]);
  function tick(){
    const v=vR.current,c=cR.current;
    if(!v||!c){rafR.current=requestAnimationFrame(tick);return;}
    if(v.readyState===v.HAVE_ENOUGH_DATA&&window.jsQR){
      c.width=v.videoWidth;c.height=v.videoHeight;
      const ctx=c.getContext('2d');ctx.drawImage(v,0,0);
      const img=ctx.getImageData(0,0,c.width,c.height);
      const res=window.jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(res){stR.current?.getTracks().forEach(t=>t.stop());onScan(res.data);return;}
    }
    rafR.current=requestAnimationFrame(tick);
  }
  return(
    <div>
      <div style={{position:'relative',borderRadius:16,overflow:'hidden',background:'#111',aspectRatio:'4/3'}}>
        <video ref={vR} playsInline muted style={{width:'100%',height:'100%',objectFit:'cover',display:st==='ok'?'block':'none'}}/>
        <canvas ref={cR} style={{display:'none'}}/>
        {st==='init'&&(
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}}>
            <div style={{width:32,height:32,border:'3px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>
            <span style={{color:'rgba(255,255,255,.6)',fontSize:14}}>Membuka kamera...</span>
          </div>
        )}
        {st==='err'&&(
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,padding:24}}>
            <i className="ti ti-camera-off" style={{fontSize:48,color:'rgba(255,255,255,.3)'}}/>
            <div style={{fontSize:15,color:'rgba(255,255,255,.7)',fontWeight:500,textAlign:'center'}}>Kamera tidak boleh diakses</div>
            <div style={{fontSize:12,color:'rgba(255,255,255,.4)',textAlign:'center'}}>Sila gunakan kamera telefon untuk mengimbas kod QR program</div>
          </div>
        )}
        {st==='ok'&&(
          <>
            <div style={{position:'absolute',inset:0,background:'radial-gradient(circle at center,transparent 30%,rgba(0,0,0,.55) 100%)'}}/>
            <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:200,height:200,pointerEvents:'none'}}>
              {[{t:0,l:0,br:'16px 0 0 0'},{t:0,r:0,bl:'0 16px 0 0'},{b:0,l:0,tr:'0 0 0 16px'},{b:0,r:0,tl:'0 0 16px 0'}].map((pos,i)=>(
                <div key={i} style={{position:'absolute',width:28,height:28,border:'3px solid #fff',...Object.fromEntries(Object.entries(pos).map(([k,v])=>[{t:'top',b:'bottom',l:'left',r:'right',tr:'borderTopRightRadius',tl:'borderTopLeftRadius',br:'borderBottomRightRadius',bl:'borderBottomLeftRadius'}[k],v]))}}/>
              ))}
              <div style={{position:'absolute',inset:0,border:'1px solid rgba(255,255,255,.15)',borderRadius:12}}/>
            </div>
          </>
        )}
      </div>
      <button onClick={onCancel} className="btn btn-block" style={{marginTop:12,background:'rgba(139,26,46,.08)',color:BGD,border:'1px solid rgba(139,26,46,.2)',fontWeight:600}}>
        Batal
      </button>
    </div>
  );
}

/* ── Attendance Form ── */
function AttendanceForm({prog,staff,att,svAt,onBack,onNext}){
  const [ic,setIc]=useState('');
  const [err,setErr]=useState('');
  const [done,setDone]=useState(null);
  const cnt=att.filter(a=>a.pId===prog.id).length;

  const submit=async()=>{
    if(ic.length<12)return setErr('No KP mestilah 12 digit');
    const s=staff.find(s=>s.noKP===ic.trim());
    if(staff.length>0&&!s)return setErr('No KP tidak dijumpai dalam sistem. Hubungi pentadbir.');
    if(att.find(a=>a.pId===prog.id&&(s?a.sId===s.id:a.noKP===ic.trim())))
      return setErr(s?`${s.nama} sudah mendaftar hadir untuk program ini.`:'No KP ini sudah digunakan untuk program ini.');
    const rec={id:gId(),pId:prog.id,sId:s?.id||'',nama:s?.nama||'—',bah:s?.bah??-1,noKP:ic.trim(),masa:Date.now(),verified:!!s};
    await svAt([...att,rec]);
    setDone({nama:s?.nama||ic,bah:s?.bah,verified:!!s});
  };

  if(done)return(
    <div style={{padding:'40px 24px 32px',textAlign:'center',animation:'popIn .4s cubic-bezier(.175,.885,.32,1.275)'}}>
      <div style={{width:88,height:88,borderRadius:'50%',background:BGL,color:BG,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',boxShadow:`0 0 0 8px rgba(139,26,46,.07), 0 0 0 16px rgba(139,26,46,.03)`}}>
        <i className="ti ti-check" style={{fontSize:44}}/>
      </div>
      <div style={{fontSize:13,color:'var(--muted)',fontWeight:500,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>Kehadiran Direkod</div>
      <div style={{fontSize:26,fontWeight:700,color:'var(--text)',marginBottom:6}}>{done.nama}</div>
      {done.bah>=0&&<div style={{marginBottom:4}}><Bdg l={BAH[done.bah]} i={done.bah}/></div>}
      <div style={{fontSize:14,color:'var(--muted)',marginTop:8,marginBottom:4}}>{prog.nama}</div>
      <div style={{fontSize:12,color:'var(--dim)',marginBottom:28}}>
        {new Date().toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit',second:'2-digit'})} · {cnt+1} kakitangan hadir
      </div>
      {onNext&&(
        <button className="btn btn-p btn-block" onClick={()=>{setDone(null);setIc('');setErr('');}}>
          <i className="ti ti-user-plus" style={{fontSize:16}}/>Kakitangan Seterusnya
        </button>
      )}
      {onBack&&<button onClick={onBack} style={{marginTop:10,background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:13}}>Kembali ke menu utama</button>}
    </div>
  );

  return(
    <div style={{padding:'24px 20px 28px',animation:'fadeUp .25s ease'}}>
      {/* Program info */}
      <div style={{background:`linear-gradient(135deg,${BARK} 0%,#6b1020 100%)`,borderRadius:14,padding:'16px 20px',marginBottom:24,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-20,right:-20,width:100,height:100,borderRadius:'50%',background:'rgba(255,255,255,.04)'}}/>
        <div style={{position:'absolute',bottom:-30,right:20,width:70,height:70,borderRadius:'50%',background:'rgba(255,255,255,.03)'}}/>
        <div style={{fontSize:9,color:'rgba(255,255,255,.35)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>{SCHOOL}</div>
        <div style={{fontSize:17,fontWeight:700,color:'#fff',marginBottom:8,position:'relative'}}>{prog.nama}</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:14,fontSize:12,color:'rgba(255,255,255,.6)',position:'relative'}}>
          <span style={{display:'flex',alignItems:'center',gap:5}}><i className="ti ti-map-pin" style={{fontSize:12}}/>{prog.tempat}</span>
          <span style={{display:'flex',alignItems:'center',gap:5}}><i className="ti ti-calendar" style={{fontSize:12}}/>{HR[prog.hari]}, {fds(prog.tarikh)}</span>
          <span style={{display:'flex',alignItems:'center',gap:5,background:'rgba(255,255,255,.1)',borderRadius:99,padding:'2px 8px'}}>
            <i className="ti ti-users" style={{fontSize:11}}/>{cnt} hadir
          </span>
        </div>
      </div>

      {/* IC input */}
      <Field label="No. Kad Pengenalan">
        <input
          placeholder="901231125432"
          value={ic} maxLength={12} inputMode="numeric"
          onChange={e=>{setIc(e.target.value.replace(/\D/g,''));setErr('');}}
          onKeyDown={e=>e.key==='Enter'&&submit()}
          style={{fontSize:22,padding:'14px 16px',textAlign:'center',letterSpacing:4,borderColor:err?'var(--err)':'var(--border)'}}
        />
        <div style={{fontSize:12,color:'var(--dim)',textAlign:'center'}}>Masukkan 12 digit tanpa sempang</div>
      </Field>

      {err&&(
        <div className="alert alert-err" style={{marginTop:12}}>
          <i className="ti ti-alert-circle" style={{fontSize:16,marginTop:1,flexShrink:0}}/>
          <span>{err}</span>

      )}

      <button className="btn btn-p btn-block" onClick={submit} style={{marginTop:16,padding:'14px',fontSize:16}}>
        <i className="ti ti-clipboard-check" style={{fontSize:18}}/>Daftar Hadir
      </button>
      {onBack&&<button onClick={onBack} style={{marginTop:10,width:'100%',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:13,padding:'6px'}}>Kembali</button>}
    </div>
  );
}

   ADMIN PANEL — desktop first
══════════════════════════════ */
function AdminPanel({staff,progs,att,svSt,svPr,svAt,pin,setPin,onBack}){
  const [tab,setTab]=useState('utama');
  const [sub,setSub]=useState(null);
  const [selP,setSelP]=useState(null);

  /* Kakitangan form */
  const [sfNama,setSfNama]=useState('');
  const [sfKP,setSfKP]=useState('');
  const [sfBah,setSfBah]=useState('0');
  const [sErr,setSErr]=useState('');
  const [sOk,setSOk]=useState('');

  /* Program form */
  const [pfNama,setPfNama]=useState('');
  const [pfTempat,setPfTempat]=useState('');
  const [pfTarikh,setPfTarikh]=useState('');
  const [pfHari,setPfHari]=useState('1');
  const [pErr,setPErr]=useState('');
  const [pOk,setPOk]=useState('');

  /* Laporan */
  const [repP,setRepP]=useState('');

  /* QR tab */
  const [qrSel,setQrSel]=useState(null);
  const [qrLoading,setQrLoading]=useState(false);
  const qrRef=useRef(null); // points to the rendered QRGen canvas wrapper

  /* PIN settings */
  const [nPin,setNPin]=useState('');
  const [pmErr,setPmErr]=useState('');
  const [pmOk,setPmOk]=useState('');

  const goTab=t=>{
    setTab(t);setSub(null);setSelP(null);
    setSErr('');setPErr('');setSOk('');setPOk('');
    if(t==='qrkod'&&!qrSel){
      const s=[...progs].sort((a,b)=>b.cAt-a.cAt);
      if(s[0])setQrSel(s[0]);
    }
  };

  const addSt=async()=>{
    if(!sfNama.trim()||!sfKP.trim())return setSErr('Sila isi semua ruangan');
    if(sfKP.length!==12)return setSErr('No KP mestilah 12 digit (tanpa sempang)');
    if(staff.find(s=>s.noKP===sfKP))return setSErr('No KP ini sudah didaftarkan dalam sistem');
    await svSt([...staff,{id:gId(),nama:sfNama.trim(),noKP:sfKP,bah:+sfBah}]);
    setSfNama('');setSfKP('');setSfBah('0');setSErr('');
    setSOk('Kakitangan berjaya didaftarkan');setTimeout(()=>setSOk(''),3000);
  };

  const addPr=async()=>{
    if(!pfNama.trim()||!pfTempat.trim()||!pfTarikh)return setPErr('Sila lengkapkan semua ruangan');
    await svPr([...progs,{id:gId(),nama:pfNama.trim(),tempat:pfTempat.trim(),tarikh:pfTarikh,hari:+pfHari,cAt:Date.now()}]);
    setPfNama('');setPfTempat('');setPfTarikh('');setPfHari('1');setPErr('');
    setPOk('Program berjaya ditambah');setTimeout(()=>setPOk(''),3000);
  };

  const delSt=async id=>svSt(staff.filter(s=>s.id!==id));
  const delPr=async id=>{
    await svPr(progs.filter(p=>p.id!==id));
    await svAt(att.filter(a=>a.pId!==id));
    if(qrSel?.id===id)setQrSel(null);
  };

  const savePin=async()=>{
    if(nPin.length<4)return setPmErr('PIN mestilah sekurang-kurangnya 4 digit');
    await setPin(nPin);setNPin('');setPmErr('');
    setPmOk('PIN berjaya dikemas kini');setTimeout(()=>setPmOk(''),3000);
  };

  /* Empty state component */
  const Empty=({icon,msg})=>(
    <div style={{textAlign:'center',padding:'48px 24px',color:'var(--dim)'}}>
      <i className={`ti ti-${icon}`} style={{fontSize:44,display:'block',marginBottom:12,color:'var(--border)'}}/>
      <div style={{fontSize:14,color:'var(--muted)'}}>{msg}</div>
    </div>
  );

  /* ── Tab: UTAMA ── */
  const tabUtama=()=>{
    const tod=new Date().toISOString().slice(0,10);
    const rec=[...progs].sort((a,b)=>b.cAt-a.cAt).slice(0,8);
    return(
      <div style={{animation:'fadeUp .25s ease'}}>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:20,fontWeight:700,marginBottom:3}}>Papan Pemuka</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>{new Date().toLocaleDateString('ms-MY',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:24}} className="stat-grid">
          <StatCard icon="users" label="Kakitangan" value={staff.length} color={BG}/>
          <StatCard icon="calendar-event" label="Program" value={progs.length} color="#5B1A6B"/>
          <StatCard icon="clipboard-check" label="Rekod Hadir" value={att.length} color="#0C5A3D"/>
          <StatCard icon="calendar-stats" label="Program Hari Ini" value={progs.filter(p=>p.tarikh===tod).length} color="#0C3070"/>
        </div>

        {rec.length>0?<>
          <div className="sec">Program Terkini</div>
          <div className="card-sh" style={{overflow:'hidden'}}>
            <table className="tbl tbl-r">
              <thead><tr>
                <th style={{width:'35%'}}>Program</th>
                <th style={{width:'20%'}}>Tempat</th>
                <th style={{width:'25%'}}>Tarikh</th>
                <th style={{width:80}}>Hadir</th>
              </tr></thead>
              <tbody>{rec.map(p=>{const cnt=att.filter(a=>a.pId===p.id).length;return(
                <tr key={p.id} onClick={()=>{setSelP(p);setSub('rep');setTab('program');}}>
                  <td><div style={{fontWeight:600,color:'var(--text)'}}>{p.nama}</div></td>
                  <td style={{color:'var(--muted)'}}>{p.tempat}</td>
                  <td style={{color:'var(--muted)'}}>{HR[p.hari]}, {fds(p.tarikh)}</td>
                  <td><span style={{background:BGL,color:BGD,padding:'3px 10px',borderRadius:99,fontWeight:700,fontSize:12,whiteSpace:'nowrap'}}>{cnt} orang</span></td>
                </tr>
              );})}
            </tbody></table>
          </div>
        </>:<Empty icon="calendar-off" msg="Tiada program. Tambah program baharu dalam tab Program."/>}
      </div>
    );
  };

  /* ── Tab: KAKITANGAN ── */
  const tabKakitangan=()=>(
    <div style={{animation:'fadeUp .25s ease',display:'grid',gridTemplateColumns:'300px 1fr',gap:20,alignItems:'start'}} className="admin-grid">
      {/* Form */}
      <div className="card" style={{padding:20,position:'sticky',top:0}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:4,color:'var(--text)'}}>Tambah Kakitangan</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Daftarkan kakitangan baru ke dalam sistem</div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Field label="Nama Penuh">
            <input placeholder="Cth: Ahmad Bin Hassan" value={sfNama} onChange={e=>setSfNama(e.target.value)}/>
          </Field>
          <Field label="No. Kad Pengenalan">
            <input placeholder="12 digit tanpa sempang" value={sfKP} maxLength={12} onChange={e=>setSfKP(e.target.value.replace(/\D/g,''))}/>
          </Field>
          <Field label="Bahagian">
            <select value={sfBah} onChange={e=>setSfBah(e.target.value)}>
              {BAH.map((b,i)=><option key={i} value={i}>{b}</option>)}
            </select>
          </Field>
          {sErr&&<div className="alert alert-err"><i className="ti ti-alert-circle" style={{fontSize:14,flexShrink:0}}/>{sErr}</div>}
          {sOk&&<div className="alert alert-ok"><i className="ti ti-check" style={{fontSize:14,flexShrink:0}}/>{sOk}</div>}
          <button className="btn btn-p btn-block" onClick={addSt}>
            <i className="ti ti-user-plus" style={{fontSize:16}}/>Daftar Kakitangan
          </button>
        </div>
      </div>

      {/* List */}
      <div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div className="sec" style={{marginBottom:0}}>{staff.length} kakitangan berdaftar</div>
        </div>
        {staff.length===0?<div className="card-sh"><Empty icon="users" msg="Belum ada kakitangan berdaftar"/></div>
        :<div className="card-sh" style={{overflow:'hidden'}}>
          <table className="tbl">
            <thead><tr>
              <th style={{width:'42%'}}>Nama</th>
              <th style={{width:'30%'}}>No. KP</th>
              <th style={{width:'20%'}}>Bahagian</th>
              <th style={{width:44,textAlign:'right'}}></th>
            </tr></thead>
            <tbody>{staff.map((s,i)=>(
              <tr key={s.id} style={{cursor:'default'}}>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:30,height:30,borderRadius:8,background:BGL,color:BGD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>
                      {s.nama.trim().split(' ').slice(0,2).map(n=>n[0]||'').join('').toUpperCase()||'?'}
                    </div>
                    <span style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.nama}</span>
                  </div>
                </td>
                <td style={{fontFamily:'monospace',fontSize:12,color:'var(--muted)'}}>{s.noKP}</td>
                <td><Bdg l={BAH[s.bah]} i={s.bah}/></td>
                <td style={{textAlign:'right'}}>
                  <button className="btn-icon" onClick={()=>delSt(s.id)} title="Padam">
                    <i className="ti ti-trash" style={{fontSize:15}}/>
                  </button>
                </td>
              </tr>
            ))}
          </tbody></table>
        </div>}
      </div>
    </div>
  );

  /* ── Program report sub-view ── */
  const tabProgRep=()=>{
    if(!selP)return null;
    const recs=[...att.filter(a=>a.pId===selP.id)].sort((a,b)=>a.masa-b.masa);
    return(
      <div style={{animation:'fadeUp .2s ease'}}>
        <button className="btn btn-g btn-sm" onClick={()=>setSub(null)} style={{marginBottom:16}}>
          <i className="ti ti-arrow-left" style={{fontSize:14}}/>Kembali
        </button>
        <div style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:16,alignItems:'start'}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,marginBottom:3}}>{selP.nama}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:1,display:'flex',alignItems:'center',gap:5}}><i className="ti ti-map-pin" style={{fontSize:11}}/>{selP.tempat}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:16,display:'flex',alignItems:'center',gap:5}}><i className="ti ti-calendar" style={{fontSize:11}}/>{HR[selP.hari]}, {fd(selP.tarikh)}</div>
            {[{l:'Jumlah Hadir',v:recs.length,bg:BGL,col:BG,tc:BGD},...BAH.map((b,i)=>({l:b,v:recs.filter(r=>r.bah===i).length,bg:'var(--page)',col:'var(--text)',tc:'var(--muted)'}))].map((x,i)=>(
              <div key={i} className="card" style={{padding:'10px 14px',marginBottom:8,background:x.bg,borderColor:i===0?'rgba(139,26,46,.2)':'var(--border)'}}>
                <div style={{fontSize:22,fontWeight:700,color:x.col}}>{x.v}</div>
                <div style={{fontSize:11,color:x.tc,fontWeight:500}}>{x.l}</div>
              </div>
            ))}
            <button className="btn btn-g btn-block btn-sm" onClick={()=>{setQrSel(selP);goTab('qrkod');}}>
              <i className="ti ti-qrcode" style={{fontSize:14}}/>Jana Kod QR
            </button>
          </div>
          {recs.length===0?<div className="card-sh"><Empty icon="users" msg="Tiada rekod kehadiran"/></div>
          :<div className="card-sh" style={{overflow:'hidden'}}>
            <table className="tbl">
              <thead><tr>
                <th style={{width:32}}>#</th>
                <th>Nama</th>
                <th style={{width:90}}>Bahagian</th>
                <th style={{width:60,textAlign:'right'}}>Masa</th>
              </tr></thead>
              <tbody>{recs.map((r,i)=>(
                <tr key={r.id} style={{cursor:'default'}}>
                  <td style={{color:'var(--dim)',fontSize:11}}>{i+1}</td>
                  <td>
                    <div style={{fontWeight:600}}>{r.nama}</div>
                    <div style={{fontSize:10,color:'var(--dim)',fontFamily:'monospace'}}>{r.noKP}</div>
                  </td>
                  <td>{r.bah>=0?<Bdg l={BAH[r.bah]} i={r.bah}/>:<span style={{fontSize:11,color:'var(--dim)'}}>—</span>}</td>
                  <td style={{textAlign:'right',color:'var(--muted)',fontSize:12}}>{ft(r.masa)}</td>
                </tr>
              ))}
            </tbody></table>
          </div>}
        </div>
      </div>
    );
  };

  /* ── Tab: PROGRAM ── */
  const tabProgram=()=>{
    if(sub==='rep'&&selP)return tabProgRep();
    const sorted=[...progs].sort((a,b)=>b.cAt-a.cAt);
    return(
      <div style={{animation:'fadeUp .25s ease',display:'grid',gridTemplateColumns:'300px 1fr',gap:20,alignItems:'start'}} className="admin-grid">
        {/* Form */}
        <div className="card" style={{padding:20,position:'sticky',top:0}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Tambah Program</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Cipta program baharu untuk rekod kehadiran</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <Field label="Nama Program">
              <input placeholder="Cth: Kursus Pemantapan PdP" value={pfNama} onChange={e=>setPfNama(e.target.value)}/>
            </Field>
            <Field label="Tempat">
              <input placeholder="Cth: Dewan Sekolah" value={pfTempat} onChange={e=>setPfTempat(e.target.value)}/>
            </Field>
            <Field label="Tarikh">
              <input type="date" value={pfTarikh} onChange={e=>setPfTarikh(e.target.value)}/>
            </Field>
            <Field label="Hari">
              <select value={pfHari} onChange={e=>setPfHari(e.target.value)}>
                {HR.map((h,i)=><option key={i} value={i}>{h}</option>)}
              </select>
            </Field>
            {pErr&&<div className="alert alert-err"><i className="ti ti-alert-circle" style={{fontSize:14,flexShrink:0}}/>{pErr}</div>}
            {pOk&&<div className="alert alert-ok"><i className="ti ti-check" style={{fontSize:14,flexShrink:0}}/>{pOk}</div>}
            <button className="btn btn-p btn-block" onClick={addPr}>
              <i className="ti ti-plus" style={{fontSize:16}}/>Tambah Program
            </button>
          </div>
        </div>
        {/* List */}
        <div>
          <div className="sec">{progs.length} program</div>
          {sorted.length===0?<div className="card-sh"><Empty icon="calendar" msg="Belum ada program. Tambah program baharu."/></div>
          :<div className="card-sh" style={{overflow:'hidden'}}>
            <table className="tbl">
              <thead><tr>
                <th style={{width:'30%'}}>Program</th>
                <th style={{width:'20%'}}>Tempat</th>
                <th style={{width:'22%'}}>Tarikh</th>
                <th style={{width:72,textAlign:'center'}}>Hadir</th>
                <th style={{width:110}}></th>
              </tr></thead>
              <tbody>{sorted.map(p=>{const cnt=att.filter(a=>a.pId===p.id).length;return(
                <tr key={p.id}>
                  <td><div style={{fontWeight:600}}>{p.nama}</div></td>
                  <td style={{color:'var(--muted)'}}>{p.tempat}</td>
                  <td style={{color:'var(--muted)',fontSize:12}}>{HR[p.hari]}, {fds(p.tarikh)}</td>
                  <td style={{textAlign:'center'}}><span style={{background:BGL,color:BGD,padding:'3px 9px',borderRadius:99,fontWeight:700,fontSize:12}}>{cnt}</span></td>
                  <td>
                    <div style={{display:'flex',gap:4,justifyContent:'flex-end'}}>
                      <button className="btn btn-g btn-sm" onClick={()=>{setQrSel(p);goTab('qrkod');}}>
                        <i className="ti ti-qrcode" style={{fontSize:13}}/>QR
                      </button>
                      <button className="btn-icon" onClick={()=>{setSelP(p);setSub('rep');}} title="Senarai">
                        <i className="ti ti-list" style={{fontSize:15}}/>
                      </button>
                      <button className="btn-icon" onClick={()=>delPr(p.id)} title="Padam">
                        <i className="ti ti-trash" style={{fontSize:15}}/>
                      </button>
                    </div>
                  </td>
                </tr>
              );})}
            </tbody></table>
          </div>}
        </div>
      </div>
    );
  };

  /* ── Tab: JANA KOD QR ── */
  const tabQRKod=()=>{
    const sorted=[...progs].sort((a,b)=>b.cAt-a.cAt);
    const sel=qrSel||sorted[0]||null;
    const base=getBaseUrl();
    const qrUrl=sel?`${base}?p=${sel.id}&nm=${encodeURIComponent(sel.nama)}&tp=${encodeURIComponent(sel.tempat)}&dt=${sel.tarikh}&hr=${sel.hari}`:'';
    const cnt=sel?att.filter(a=>a.pId===sel.id).length:0;

    if(progs.length===0)return(
      <div className="card-sh"><Empty icon="qrcode-off" msg="Tambah program dahulu sebelum menjana kod QR."/></div>
    );

    return(
      <div style={{animation:'fadeUp .25s ease',display:'grid',gridTemplateColumns:'220px 1fr',gap:0,minHeight:480}}>
        {/* Program list */}
        <div style={{borderRight:'1px solid var(--border)',overflowY:'auto'}}>
          <div style={{padding:'10px 14px 8px',borderBottom:'1px solid var(--border2)'}}>
            <div className="sec" style={{marginBottom:0}}>Pilih Program</div>
          </div>
          {sorted.map(p=>{
            const isSel=sel?.id===p.id;
            const c2=att.filter(a=>a.pId===p.id).length;
            return(
              <div key={p.id} className={`pi${isSel?' on':''}`} onClick={()=>setQrSel(p)}>
                <div style={{fontWeight:isSel?600:500,fontSize:13,color:isSel?BGD:'var(--text)',marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.nama}</div>
                <div style={{fontSize:11,color:isSel?BGD:'var(--muted)'}}>{HR[p.hari]}, {fds(p.tarikh)}</div>
                <div style={{fontSize:11,color:isSel?BG:'var(--dim)',marginTop:3,fontWeight:isSel?600:400}}>{c2} hadir</div>
              </div>
            );
          })}
        </div>

        {/* QR display */}
        {sel&&(
          <div style={{padding:'0 0 28px 24px',display:'flex',flexDirection:'column',gap:16}}>
            {/* Banner */}
            <div style={{background:`linear-gradient(135deg,${BARK} 0%,#6b1020 100%)`,borderRadius:12,padding:'15px 18px',color:'#fff',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',right:-20,top:-20,width:100,height:100,borderRadius:'50%',background:'rgba(255,255,255,.04)'}}/>
              <div style={{fontSize:9,color:'rgba(255,255,255,.35)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:5}}>{SCHOOL}</div>
              <div style={{fontSize:15,fontWeight:700,marginBottom:6,position:'relative'}}>{sel.nama}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:12,fontSize:12,color:'rgba(255,255,255,.6)',position:'relative'}}>
                <span><i className="ti ti-map-pin" style={{fontSize:11,marginRight:3}}/>{sel.tempat}</span>
                <span><i className="ti ti-calendar" style={{fontSize:11,marginRight:3}}/>{HR[sel.hari]}, {fds(sel.tarikh)}</span>
                <span style={{background:'rgba(255,255,255,.12)',borderRadius:99,padding:'2px 8px'}}>
                  <i className="ti ti-users" style={{fontSize:11,marginRight:3}}/>{cnt} hadir
                </span>
              </div>
            </div>

            <div style={{display:'flex',gap:20,alignItems:'flex-start'}}>
              {/* QR box */}
              <div className="card-sh" style={{padding:20,textAlign:'center',flexShrink:0,background:'#fff'}}>
                <QRGen data={qrUrl} size={200} wrapRef={qrRef}/>
                <div style={{marginTop:12,padding:'8px 12px',background:'var(--page)',borderRadius:8,border:'1px solid var(--border2)'}}>
                  <div style={{fontSize:9,color:'var(--dim)',marginBottom:3,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>ID Program</div>
                  <code style={{fontSize:10,color:'var(--muted)',fontFamily:'monospace'}}>{sel.id}</code>
                </div>
              </div>

              {/* Actions */}
              <div style={{flex:1,minWidth:0}}>
                {/* Info box */}
                <div className="alert alert-info" style={{marginBottom:14,flexDirection:'column',gap:6}}>
                  <div style={{fontWeight:600,display:'flex',alignItems:'center',gap:6}}><i className="ti ti-world" style={{fontSize:14}}/>Imbas dengan Mana-mana Apl</div>
                  <div style={{fontSize:12,lineHeight:1.6}}>Kod QR ini mengandungi URL yang boleh diimbas terus oleh kamera telefon, WhatsApp, atau sebarang apl QR scanner — tanpa perlu buka apl ini dahulu.</div>
                </div>

                {/* Steps */}
                <div className="card" style={{padding:'14px 16px',marginBottom:14}}>
                  <div className="sec">Cara Penggunaan</div>
                  {[['Paparkan atau cetak QR kod ini'],['Kakitangan imbas dengan kamera telefon'],['Laman web pendaftaran dibuka automatik'],['Masukkan No. KP untuk daftar hadir']].map(([t],i)=>(
                    <div key={i} style={{display:'flex',gap:10,alignItems:'center',marginBottom:i<3?9:0,paddingBottom:i<3?9:0,borderBottom:i<3?'1px solid var(--border2)':'none'}}>
                      <div style={{width:20,height:20,borderRadius:6,background:BG,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,flexShrink:0}}>{i+1}</div>
                      <div style={{fontSize:12,color:'var(--text)'}}>{t}</div>
                    </div>
                  ))}
                </div>

                {/* Buttons */}
                <div style={{display:'flex',flexDirection:'column',gap:9}}>
                  <button className="btn btn-p btn-block" onClick={async()=>{
                    setQrLoading(true);
                    try{
                      const canvas=await waitForQRCanvas(qrRef);
                      downloadQR(sel,canvas);
                    }catch(e){alert(e.message);}
                    finally{setQrLoading(false);}
                  }}>
                    {qrLoading
                      ?<span style={{width:16,height:16,border:'2px solid rgba(255,255,255,.4)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>
                      :<i className="ti ti-download" style={{fontSize:16}}/>
                    }
                    {qrLoading?'Menjana QR...':'Muat Turun QR (PNG)'}
                  </button>
                  <button className="btn btn-o btn-block" onClick={async()=>{
                    try{
                      const canvas=await waitForQRCanvas(qrRef);
                      printQR(sel,canvas);
                    }catch(e){alert(e.message);}
                  }}>
                    <i className="ti ti-printer" style={{fontSize:16}}/>Cetak Kod QR
                  </button>
                  <button className="btn btn-g btn-block btn-sm" onClick={()=>{setSelP(sel);setSub('rep');setTab('program');}}>
                    <i className="ti ti-clipboard-list" style={{fontSize:13}}/>Lihat Senarai Kehadiran
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  /* ── Tab: LAPORAN ── */
  const tabLaporan=()=>{
    const cur=repP?progs.find(p=>p.id===repP):null;
    const recs=cur?[...att.filter(a=>a.pId===cur.id)].sort((a,b)=>a.masa-b.masa):[];
    return(
      <div style={{animation:'fadeUp .25s ease'}}>
        <div style={{marginBottom:16}}>
          <label className="lbl" style={{marginBottom:6}}>Pilih Program</label>
          <select value={repP} onChange={e=>setRepP(e.target.value)} style={{maxWidth:360}}>
            <option value="">— Pilih program —</option>
            {progs.map(p=><option key={p.id} value={p.id}>{p.nama} · {fds(p.tarikh)}</option>)}
          </select>
        </div>

        {cur&&<div style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:16,alignItems:'start'}}>
          <div>
            <div className="card" style={{padding:14,marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{cur.nama}</div>
              <div style={{fontSize:12,color:'var(--muted)',display:'flex',alignItems:'center',gap:5,marginBottom:3}}><i className="ti ti-map-pin" style={{fontSize:11}}/>{cur.tempat}</div>
              <div style={{fontSize:12,color:'var(--muted)',display:'flex',alignItems:'center',gap:5}}><i className="ti ti-calendar" style={{fontSize:11}}/>{HR[cur.hari]}, {fd(cur.tarikh)}</div>
            </div>
            {[{l:'Jumlah Hadir',v:recs.length,bg:BGL,col:BG,tc:BGD},...BAH.map((b,i)=>({l:b,v:recs.filter(r=>r.bah===i).length,bg:'var(--page)',col:'var(--text)',tc:'var(--muted)'}))].map((x,i)=>(
              <div key={i} className="card" style={{padding:'10px 14px',marginBottom:8,background:x.bg,borderColor:i===0?'rgba(139,26,46,.2)':'var(--border)'}}>
                <div style={{fontSize:22,fontWeight:700,color:x.col}}>{x.v}</div>
                <div style={{fontSize:11,color:x.tc,fontWeight:500}}>{x.l}</div>
              </div>
            ))}
          </div>
          {recs.length===0?<div className="card-sh"><Empty icon="users" msg="Tiada rekod kehadiran untuk program ini"/></div>
          :<div className="card-sh" style={{overflow:'hidden'}}>
            <table className="tbl">
              <thead><tr>
                <th style={{width:32}}>#</th>
                <th>Nama / No. KP</th>
                <th style={{width:100}}>Bahagian</th>
                <th style={{width:60,textAlign:'right'}}>Masa</th>
              </tr></thead>
              <tbody>{recs.map((r,i)=>(
                <tr key={r.id} style={{cursor:'default'}}>
                  <td style={{color:'var(--dim)',fontSize:11}}>{i+1}</td>
                  <td>
                    <div style={{fontWeight:600}}>{r.nama}</div>
                    <div style={{fontSize:10,color:'var(--dim)',fontFamily:'monospace'}}>{r.noKP}</div>
                  </td>
                  <td>{r.bah>=0?<Bdg l={BAH[r.bah]} i={r.bah}/>:<span style={{fontSize:11,color:'var(--dim)'}}>—</span>}</td>
                  <td style={{textAlign:'right',color:'var(--muted)',fontSize:12}}>{ft(r.masa)}</td>
                </tr>
              ))}
            </tbody></table>
          </div>}
        </div>}
        {!cur&&<div className="card-sh"><Empty icon="chart-bar" msg="Pilih program untuk melihat laporan kehadiran"/></div>}
      </div>
    );
  };

  /* ── Tab: TETAPAN ── */
  const tabTetapan=()=>(
    <div style={{animation:'fadeUp .25s ease',maxWidth:500}}>
      <div className="card" style={{padding:20,marginBottom:14}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>Keselamatan</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>Tukar PIN yang digunakan untuk log masuk ke panel admin. PIN lalai ialah <strong>1234</strong>.</div>
        <Field label="PIN Baharu (4–8 digit)">
          <input type="password" placeholder="Masukkan PIN baharu" value={nPin} maxLength={8} onChange={e=>setNPin(e.target.value.replace(/\D/g,''))}/>
        </Field>
        {pmErr&&<div className="alert alert-err" style={{marginTop:10}}><i className="ti ti-alert-circle" style={{fontSize:14,flexShrink:0}}/>{pmErr}</div>}
        {pmOk&&<div className="alert alert-ok" style={{marginTop:10}}><i className="ti ti-check" style={{fontSize:14,flexShrink:0}}/>{pmOk}</div>}
        <button className="btn btn-p" style={{marginTop:12}} onClick={savePin}>
          <i className="ti ti-lock" style={{fontSize:15}}/>Simpan PIN Baharu
        </button>
      </div>
      <div className="card" style={{padding:20}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>Keluar dari Panel Admin</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>Kembali ke skrin daftar kehadiran kakitangan.</div>
        <button className="btn btn-g" onClick={onBack}>
          <i className="ti ti-arrow-left" style={{fontSize:15}}/>Kembali ke Skrin Kakitangan
        </button>
      </div>
    </div>
  );

  const renderTab=()=>{
    switch(tab){
      case 'utama':       return tabUtama();
      case 'kakitangan':  return tabKakitangan();
      case 'program':     return tabProgram();
      case 'qrkod':       return tabQRKod();
      case 'laporan':     return tabLaporan();
      case 'tetapan':     return tabTetapan();
      default:            return tabUtama();
    }
  };

  const NAVS=[
    {id:'utama',ic:'layout-dashboard',l:'Papan Pemuka'},
    {id:'kakitangan',ic:'users',l:'Kakitangan'},
    {id:'program',ic:'calendar',l:'Program'},
    {id:'qrkod',ic:'qrcode',l:'Jana Kod QR'},
    {id:'laporan',ic:'chart-bar',l:'Laporan'},
    {id:'tetapan',ic:'settings',l:'Tetapan'},
  ];
  const hdrTitle=sub==='rep'&&selP?`Kehadiran — ${selP.nama}`:{utama:'Papan Pemuka',kakitangan:'Kakitangan',program:'Program',qrkod:'Jana Kod QR',laporan:'Laporan',tetapan:'Tetapan'}[tab];

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* Sidebar */}
      <div style={{width:200,flexShrink:0,background:`linear-gradient(180deg,${BARK} 0%,#200408 100%)`,display:'flex',flexDirection:'column',minHeight:'100vh',borderRight:'1px solid rgba(255,255,255,.05)'}}>
        {/* Brand */}
        <div style={{padding:'18px 14px 14px',borderBottom:'1px solid rgba(255,255,255,.06)'}}>
          <div style={{fontSize:9,color:'rgba(255,255,255,.28)',letterSpacing:'.09em',textTransform:'uppercase',marginBottom:4}}>{SCHOOL}</div>
          <div style={{fontSize:13,fontWeight:700,color:'#fff',lineHeight:1.35}}>Sistem Kehadiran Program</div>
          <div style={{marginTop:8,display:'inline-flex',alignItems:'center',gap:5,background:'rgba(255,255,255,.08)',borderRadius:6,padding:'3px 9px',border:'1px solid rgba(255,255,255,.08)'}}>
            <i className="ti ti-shield-check" style={{fontSize:11,color:BGL}}/>
            <span style={{fontSize:10,color:BGL,fontWeight:600}}>ADMIN</span>
          </div>
        </div>

        {/* Nav */}
        <div style={{padding:'10px 8px',flex:1}}>
          {NAVS.map(n=>(
            <button key={n.id} className={`nav${tab===n.id?' on':''}${n.id==='qrkod'?' qr':''}`} onClick={()=>goTab(n.id)}>
              <i className={`ti ti-${n.ic}`} style={{fontSize:17,flexShrink:0}}/>
              <span style={{flex:1}}>{n.l}</span>
              {n.id==='qrkod'&&<span style={{background:BG,color:'#fff',fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:99}}>QR</span>}
            </button>
          ))}
        </div>

        {/* Footer */}
        <div style={{padding:'10px 8px',borderTop:'1px solid rgba(255,255,255,.05)'}}>
          <button className="nav" onClick={onBack}>
            <i className="ti ti-arrow-left" style={{fontSize:16}}/>
            <span>Keluar Admin</span>
          </button>
        </div>
      </div>

      {/* Main content */}
      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',background:'var(--page)'}}>
        {/* Top bar */}
        <div style={{padding:'12px 22px',borderBottom:'1px solid var(--border)',background:'#fff',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'var(--sh1)'}}>
          <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{hdrTitle}</div>
          <div style={{fontSize:11,color:'var(--dim)',fontWeight:500}}>
            {new Date().toLocaleDateString('ms-MY',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
          </div>
        </div>
        {/* Content */}
        <div style={{padding:'20px 22px 36px',flex:1,overflowY:'auto'}}>{renderTab()}</div>
      </div>
    </div>
  );
}

/* ════════════════════
   ROOT
════════════════════ */
function App(){
  const [mode,setMode]=useState(null);
  const [staff,setStaff]=useState([]);
  const [progs,setProgs]=useState([]);
  const [att,setAtt]=useState([]);
  const [pin,setPin]=useState(DEF_PIN);
  const [pinIn,setPinIn]=useState('');
  const [pinErr,setPinErr]=useState('');
  const [directProg,setDirectProg]=useState(null);

  useEffect(()=>{
    (async()=>{
      await ld(SK.ST,setStaff);await ld(SK.PR,setProgs);await ld(SK.AT,setAtt);
      try{const v=localStorage.getItem(SK.PIN);if(v)setPin(JSON.parse(v));}catch{}
      const dp=getProgramFromURL();
      if(dp?.id){setDirectProg(dp);setMode('direct');}
      else{setMode('kakitangan');}
    })();
  },[]);

  const svSt=async d=>{setStaff(d);await sv(SK.ST,d);};
  const svPr=async d=>{setProgs(d);await sv(SK.PR,d);};
  const svAt=async d=>{setAtt(d);await sv(SK.AT,d);};
  const updPin=async p=>{setPin(p);await sv(SK.PIN,p);};

  const tryAdmin=()=>{
    if(pinIn===pin){setPinIn('');setPinErr('');setMode('admin');}
    else{setPinErr('PIN tidak sah. Sila cuba lagi.');setPinIn('');}
  };

  /* Loading */
  if(!mode)return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:14,background:'#fff'}}>
      <div style={{width:36,height:36,border:`3px solid ${BGL}`,borderTopColor:BG,borderRadius:'50%',animation:'spin .7s linear infinite'}}/>
      <div style={{fontSize:14,color:'var(--muted)',fontWeight:500}}>Memuatkan sistem...</div>
    </div>
  );

  /* Direct attendance (from URL / any QR scanner) */
  if(mode==='direct'&&directProg)return(
    <div style={{minHeight:'100vh',background:'#fff',maxWidth:480,margin:'0 auto',boxShadow:'0 0 40px rgba(0,0,0,.08)'}}>
      <div style={{background:`linear-gradient(135deg,${BARK} 0%,${BARK2} 100%)`,padding:'14px 20px 13px'}}>
        <div style={{fontSize:9,color:'rgba(255,255,255,.35)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:2}}>{SCHOOL}</div>
        <div style={{fontSize:16,fontWeight:700,color:'#fff'}}>Daftar Kehadiran</div>
      </div>
      <AttendanceForm prog={directProg} staff={staff} att={att} svAt={svAt}
        onBack={()=>{window.history.replaceState({},'',window.location.pathname);setMode('kakitangan');}}
        onNext={true}/>
    </div>
  );

  /* PIN entry */
  if(mode==='pin')return(
    <div style={{minHeight:'100vh',background:'var(--page)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:20,padding:'32px 28px',maxWidth:380,width:'100%',boxShadow:'var(--sh3)',border:'1px solid var(--border)'}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{width:58,height:58,borderRadius:16,background:BGL,color:BG,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,margin:'0 auto 14px',border:'1px solid rgba(139,26,46,.15)'}}>
            <i className="ti ti-shield-lock"/>
          </div>
          <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>Log Masuk Admin</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>Masukkan PIN untuk akses panel pengurusan</div>
        </div>

        <Field label="PIN Admin">
          <input type="password" inputMode="numeric" placeholder="● ● ● ●"
            value={pinIn} maxLength={8}
            onChange={e=>{setPinIn(e.target.value.replace(/\D/g,''));setPinErr('');}}
            onKeyDown={e=>e.key==='Enter'&&tryAdmin()}
            style={{fontSize:28,padding:'14px 18px',textAlign:'center',letterSpacing:8,borderColor:pinErr?'var(--err)':'var(--border)'}}
          />
        </Field>

        {pinErr&&<div className="alert alert-err" style={{marginTop:10}}><i className="ti ti-alert-circle" style={{fontSize:14,flexShrink:0}}/>{pinErr}</div>}

        <button className="btn btn-p btn-block" style={{marginTop:14,padding:'13px',fontSize:15}} onClick={tryAdmin}>
          <i className="ti ti-login" style={{fontSize:18}}/>Log Masuk
        </button>
        <button onClick={()=>{setMode('kakitangan');setPinIn('');setPinErr('');}}
          style={{marginTop:10,width:'100%',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:13,padding:'6px'}}>
          ← Kembali ke Daftar Kehadiran
        </button>
        <div style={{textAlign:'center',marginTop:8,fontSize:11,color:'var(--dim)'}}>PIN lalai: <strong style={{color:'var(--muted)'}}>1234</strong></div>
      </div>
    </div>
  );

  /* Admin panel */
  if(mode==='admin')return(
    <AdminPanel staff={staff} progs={progs} att={att} svSt={svSt} svPr={svPr} svAt={svAt}
      pin={pin} setPin={updPin} onBack={()=>setMode('kakitangan')}/>
  );

  /* Kakitangan (default) */
  return(
    <KakitanganView staff={staff} progs={progs} att={att} svAt={svAt}
      onAdmin={()=>{setPinIn('');setPinErr('');setMode('pin');}}/>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
