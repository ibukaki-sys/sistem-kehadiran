<style>
:root{--wine:#8B1A2E;--wine-l:#FDF0F2;--wine-m:#A82035;--wine-d:#5C001A;--bark:#2D0510;--page:#F9F4F5;--card:#FFF;--border:#EDD8DC;--border2:#F7EDEF;--text:#1A0A0D;--muted:#7A4555;--dim:#C09AA8;--ok:#0F6B3D;--ok-l:#EEFAF3;--err:#B91C1C;--err-l:#FEF2F2;--warn-l:#FFFBEB;--warn:#92400E;--r:12px;--r-s:8px;--sh1:0 1px 3px rgba(0,0,0,.05);--sh2:0 4px 16px rgba(0,0,0,.07);--sh3:0 8px 36px rgba(139,26,46,.14)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',-apple-system,sans-serif;background:var(--page);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
#root{max-width:980px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 80px rgba(139,26,46,.1)}
input,select,button,textarea{font-family:'Outfit',sans-serif}
input,select{display:block;width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r-s);background:#fff;font-size:14px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus{border-color:var(--wine);box-shadow:0 0 0 3px rgba(139,26,46,.09)}
input::placeholder{color:var(--dim)}
label.lbl{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.fld{display:flex;flex-direction:column;gap:5px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:var(--r-s);cursor:pointer;font-weight:600;font-size:14px;transition:all .15s;border:none;padding:10px 18px;font-family:'Outfit',sans-serif}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--wine);color:#fff;box-shadow:0 2px 10px rgba(139,26,46,.28)}.btn-p:hover{background:var(--wine-m)}.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-o{background:transparent;color:var(--bark);border:1.5px solid var(--bark)}.btn-o:hover{background:var(--wine-l);border-color:var(--wine);color:var(--wine-d)}.btn-o:disabled{opacity:.5;cursor:not-allowed}
.btn-g{background:var(--wine-l);color:var(--wine-d);border:1px solid rgba(139,26,46,.15);font-size:13px;padding:8px 14px}.btn-g:hover{background:#fce4e8}
.btn-dk{color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);font-size:12px;padding:6px 12px}.btn-dk:hover{background:rgba(255,255,255,.18);color:#fff}
.btn-block{width:100%}.btn-sm{padding:7px 13px;font-size:12px;gap:5px}
.btn-icon{padding:6px;border-radius:6px;background:none;border:none;cursor:pointer;color:var(--dim);transition:all .15s}.btn-icon:hover{background:var(--wine-l);color:var(--wine-d)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
.card-sh{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh2)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.tbl th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;background:var(--wine-l);border-bottom:1.5px solid var(--border)}
.tbl td{padding:10px 14px;border-top:1px solid var(--border2);vertical-align:middle}
.tbl tbody tr{transition:background .1s}.tbl tbody tr:hover td{background:#fdf8f9;cursor:pointer}
.sec{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.alert{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:var(--r-s);font-size:13px;line-height:1.5}
.alert-err{background:var(--err-l);color:var(--err);border:1px solid #FECACA}
.alert-ok{background:var(--ok-l);color:var(--ok);border:1px solid #A7F3D0}
.alert-warn{background:var(--warn-l);color:var(--warn);border:1px solid #FDE68A}
.alert-info{background:var(--wine-l);color:var(--wine-d);border:1px solid rgba(139,26,46,.2)}
.nav{width:100%;display:flex;align-items:center;gap:9px;background:none;border:none;border-radius:var(--r-s);padding:9px 11px;cursor:pointer;margin-bottom:2px;color:rgba(255,255,255,.42);text-align:left;font-size:13px;font-weight:400;border-left:2px solid transparent;transition:all .15s;font-family:'Outfit',sans-serif}
.nav:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.75)}.nav.on{background:rgba(255,255,255,.11);color:#fff;font-weight:600;border-left-color:var(--wine)}.nav.qr.on{background:rgba(139,26,46,.38)}
.pi{padding:12px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;border-bottom:1px solid var(--border2)}.pi:hover{background:var(--wine-l);border-left-color:rgba(139,26,46,.3)}.pi.on{background:var(--wine-l);border-left-color:var(--wine)}
.sch-banner{background:linear-gradient(135deg,#2D0510 0%,#4a0a1a 60%,#3D0A18 100%);position:relative;overflow:hidden}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
</style>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const BG='#8B1A2E',BGL='#FDF0F2',BGD='#5C001A',BARK='#2D0510';

/* ── Date helpers — handles Google Sheets date formats ── */
function parseDt(d){
  if(!d&&d!==0)return null;
  if(typeof d==='number'){
    // Excel/Sheets serial date
    return new Date((d-25569)*86400*1000);
  }
  const s=String(d).trim();
  if(!s||s==='—')return null;
  // ISO: 2026-06-05
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return new Date(s+'T00:00');
  // ISO with time
  if(s.includes('T')||s.includes('Z'))return new Date(s);
  // Try direct parse
  const dt=new Date(s);
  return isNaN(dt)?null:dt;
}
const fd=d=>{const dt=parseDt(d);return dt&&!isNaN(dt)?dt.toLocaleDateString('ms-MY',{day:'2-digit',month:'long',year:'numeric'}):'—';};
const fds=d=>{const dt=parseDt(d);return dt&&!isNaN(dt)?dt.toLocaleDateString('ms-MY',{day:'2-digit',month:'short',year:'numeric'}):'—';};
const ft=ts=>{try{return new Date(ts).toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit'});}catch{return '';}};

/* Calculate bilangan jam from masa_mula & masa_tamat */
function calcJam(mula,tamat){
  if(!mula||!tamat)return null;
  const [mh,mm]=mula.split(':').map(Number);
  const [th,tm]=tamat.split(':').map(Number);
  const diff=(th*60+tm)-(mh*60+mm);
  if(diff<=0)return null;
  const h=Math.floor(diff/60),m=diff%60;
  return m>0?`${h} jam ${m} minit`:`${h} jam`;
}

/* Calculate QR expiry timestamp: tarikh + masa_tamat + 1 hour */
function calcExpiry(prog){
  if(!prog.tarikh||!prog.masa_tamat)return '0';
  try{
    const s=String(prog.tarikh).trim();
    // Get date part only
    const datePart=s.includes('T')?s.split('T')[0]:/^\d{4}-\d{2}-\d{2}$/.test(s)?s:null;
    if(!datePart)return '0';
    const end=new Date(`${datePart}T${prog.masa_tamat}:00`);
    if(isNaN(end))return '0';
    end.setHours(end.getHours()+1);
    return String(end.getTime());
  }catch{return '0';}
}

    try{
      const s=String(prog.tarikh).trim();
      const datePart=s.includes('T')?s.split('T')[0]:/^\d{4}-\d{2}-\d{2}$/.test(s)?s:null;
      if(datePart){
        const start=new Date(`${datePart}T${prog.masa_mula}:00`);
        if(!isNaN(start)&&now<start.getTime()){
          return{valid:false,reason:'early',start:start.getTime()};
        }
      }
    }catch{}
  }
  return{valid:true};
}

/* ── QRGen — stable, no blinking ── */
function QRGen({data,size=200,onDU}){
  const ref=useRef();
  // Only regenerate when data actually changes
  const prevData=useRef('');
  useEffect(()=>{
    if(!data||!ref.current||data===prevData.current)return;
    prevData.current=data;
    ref.current.innerHTML='';
    const tmp=document.createElement('div');
    try{new window.QRCode(tmp,{text:data,width:size,height:size,colorDark:BARK,colorLight:'#ffffff',correctLevel:(window.QRCode&&window.QRCode.CorrectLevel)?window.QRCode.CorrectLevel.M:0});}
    catch(e){console.error(e);return;}
    const cv=tmp.querySelector('canvas');
    if(cv&&cv.width>0){const du=cv.toDataURL('image/png');if(onDU)onDU(du);ref.current.appendChild(cv);}
    else{setTimeout(()=>{const im=tmp.querySelector('img');if(im&&im.src&&im.src.startsWith('data:')){if(onDU)onDU(im.src);const i2=new Image();i2.src=im.src;i2.width=size;i2.height=size;i2.style.display='block';if(ref.current)ref.current.appendChild(i2);}},500);}
  },[data,size]);
  return<div ref={ref} style={{lineHeight:0,display:'flex',alignItems:'center',justifyContent:'center'}}/>;
}

    x.fillStyle='#B8909A';x.font='10px Arial';x.fillText('Imbas dengan kamera telefon atau mana-mana apl QR scanner',W/2,iy+90);

/* ── QR Scanner ── */
function QRScan({onScan,onCancel}){
  const vR=useRef(),cR=useRef(),rafR=useRef(),stR=useRef();
  const [st,setSt]=useState('init');
  useEffect(()=>{
    (async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});stR.current=s;if(vR.current){vR.current.srcObject=s;await vR.current.play();setSt('ok');tick();}}catch{setSt('err');}})();
    return()=>{cancelAnimationFrame(rafR.current);stR.current?.getTracks().forEach(t=>t.stop());};
  },[]);
  function tick(){const v=vR.current,c=cR.current;if(!v||!c){rafR.current=requestAnimationFrame(tick);return;}if(v.readyState===v.HAVE_ENOUGH_DATA&&window.jsQR){c.width=v.videoWidth;c.height=v.videoHeight;const ctx=c.getContext('2d');ctx.drawImage(v,0,0);const im=ctx.getImageData(0,0,c.width,c.height);const r=window.jsQR(im.data,im.width,im.height,{inversionAttempts:'dontInvert'});if(r){stR.current?.getTracks().forEach(t=>t.stop());onScan(r.data);return;}}rafR.current=requestAnimationFrame(tick);}
  return<div><div style={{position:'relative',borderRadius:16,overflow:'hidden',background:'#111',aspectRatio:'4/3'}}>
    <video ref={vR} playsInline muted style={{width:'100%',height:'100%',objectFit:'cover',display:st==='ok'?'block':'none'}}/>
    <canvas ref={cR} style={{display:'none'}}/>
    {st==='init'&&<div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}}><div style={{width:30,height:30,border:'3px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .7s linear infinite'}}/><span style={{color:'rgba(255,255,255,.6)',fontSize:13}}>Membuka kamera...</span></div>}
    {st==='err'&&<div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,padding:24}}><i className="ti ti-camera-off" style={{fontSize:44,color:'rgba(255,255,255,.3)'}}/><div style={{fontSize:14,color:'rgba(255,255,255,.7)',fontWeight:500,textAlign:'center'}}>Kamera tidak boleh diakses</div></div>}
    {st==='ok'&&<><div style={{position:'absolute',inset:0,background:'radial-gradient(circle at center,transparent 28%,rgba(0,0,0,.55) 100%)'}}/>
      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:190,height:190,pointerEvents:'none'}}>
        {[[{top:0,left:0},{borderTopLeftRadius:12}],[{top:0,right:0},{borderTopRightRadius:12}],[{bottom:0,left:0},{borderBottomLeftRadius:12}],[{bottom:0,right:0},{borderBottomRightRadius:12}]].map(([p,r],i)=><div key={i} style={{position:'absolute',width:26,height:26,border:'3px solid #fff',...p,...r}}/>)}
      </div></>}
  </div><button className="btn btn-g btn-block" style={{marginTop:12}} onClick={onCancel}>Batal</button></div>;
}

        <div>No KP <strong>{ic}</strong> tidak ada dalam pangkalan data. Masukkan nama untuk hadir sebagai tetamu.</div>
      </div>

      <button className="btn btn-p btn-block" onClick={submit} style={{marginTop:14,padding:'14px',fontSize:16}} disabled={load||!wNama.trim()}>
        {load?<span style={{width:18,height:18,border:'2px solid rgba(255,255,255,.4)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>:<i className="ti ti-clipboard-check" style={{fontSize:18}}/>}
        Daftar Hadir (Tanpa Rekod)
      </button>
      <button className="btn btn-g btn-block" style={{marginTop:8}} onClick={()=>{setWalk(false);setWNama('');setErr('');}}>
        <i className="ti ti-arrow-left" style={{fontSize:14}}/>Cuba No KP Lain
      </button>
    </>}
    {onBack&&<button onClick={onBack} style={{marginTop:10,width:'100%',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:13,padding:'6px'}}>Kembali</button>}
  </div>;
}

/* ══ KAKITANGAN VIEW ══ */
function KView({onAdmin}){

          <div style={{width:80,height:80,borderRadius:'50%',background:'rgba(255,255,255,.15)',border:'1.5px solid rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',position:'relative'}}><i className="ti ti-qrcode-scan" style={{fontSize:38,color:'#fff'}}/></div>
          <div style={{fontSize:21,fontWeight:700,color:'#fff',marginBottom:5,position:'relative'}}>Imbas Kod QR</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,.65)',position:'relative'}}>Buka kamera dan arahkan ke kod QR program</div>
        </button>
        <div className="card" style={{padding:'18px 20px'}}>
          <div className="sec">Cara Pendaftaran</div>
          {[{ic:'qrcode',t:'Dapatkan kod QR daripada pentadbir'},{ic:'scan',t:'Imbas dengan apl ini atau kamera telefon'},{ic:'id-badge',t:'Masukkan No. Kad Pengenalan anda'},{ic:'circle-check',t:'Kehadiran direkod secara automatik'}].map(({ic,t},i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,marginBottom:i<3?12:0,padding:'8px 0',borderBottom:i<3?'1px solid var(--border2)':'none'}}>
              <div style={{width:30,height:30,borderRadius:8,background:BGL,color:BG,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><i className={`ti ti-${ic}`} style={{fontSize:15}}/></div>
              <div style={{fontSize:13,color:'var(--text)',fontWeight:500}}>{t}</div>
            </div>
          ))}
        </div>
      </div>}
      {sc==='scanning'&&<div style={{padding:'20px',animation:'fadeUp .2s ease'}}>
        <button className="btn btn-g btn-sm" onClick={()=>setSc('home')} style={{marginBottom:14}}><i className="ti ti-arrow-left" style={{fontSize:14}}/>Kembali</button>
        <div className="sec" style={{textAlign:'center',marginBottom:12}}>Arahkan ke kod QR program</div>
        <QRScan onScan={scan} onCancel={()=>setSc('home')}/>
      </div>}
      {sc==='attend'&&prog&&<AttForm prog={prog} onBack={()=>{setSc('home');setProg(null);}} onNext={true}/>}
      {sc==='invalid'&&<div style={{padding:'50px 24px',textAlign:'center',animation:'fadeUp .25s ease'}}>
        <div style={{width:80,height:80,borderRadius:'50%',background:'#FEF2F2',color:'#B91C1C',display:'flex',alignItems:'center',justifyContent:'center',fontSize:40,margin:'0 auto 16px'}}><i className="ti ti-qrcode-off"/></div>
        <div style={{fontSize:20,fontWeight:700,marginBottom:8}}>Kod QR Tidak Dikenali</div>
        <div style={{fontSize:14,color:'var(--muted)',marginBottom:28,lineHeight:1.6}}>Sila dapatkan kod QR yang betul daripada pentadbir.</div>
        <button className="btn btn-p" onClick={()=>setSc('home')}>Cuba Lagi</button>
      </div>}
    </div>
  </div>;
}

/* ══ ADMIN PANEL ══ */
function Admin({pin,setPin,onBack}){
  const [tab,setTab]=useState('utama');
  const [sub,setSub]=useState(null);
  const [selP,setSelP]=useState(null);
  const [staff,setStaff]=useState([]);
  const [progs,setProgs]=useState([]);
  const [aMap,setAMap]=useState({});
  const [loading,setLoading]=useState(true);
  const [dbErr,setDbErr]=useState('');
  // QR tab state
  const [qSel,setQSel]=useState(null);
  const [qDU,setQDU]=useState('');
  const [qUrl,setQUrl]=useState(''); // stable URL, only changes when program changes
  // Kakitangan form
  const [sfN,setSfN]=useState('');const [sfK,setSfK]=useState('');const [sfB,setSfB]=useState('0');
  const [sErr,setSErr]=useState('');const [sOk,setSOk]=useState('');
  // Program form
  const [pfN,setPfN]=useState('');const [pfT,setPfT]=useState('');const [pfD,setPfD]=useState('');
  const [pfH,setPfH]=useState('1');const [pfMM,setPfMM]=useState('08:00');const [pfMT,setPfMT]=useState('17:00');
  const [pErr,setPErr]=useState('');const [pOk,setPOk]=useState('');
  // Laporan
  const [rP,setRP]=useState('');const [rData,setRData]=useState([]);const [rLoad,setRLoad]=useState(false);
  // Program report
  const [prData,setPrData]=useState([]);const [prLoad,setPrLoad]=useState(false);
  // Settings
  const [nPin,setNPin]=useState('');const [pmErr,setPmErr]=useState('');const [pmOk,setPmOk]=useState('');
  const [gsOk,setGsOk]=useState('');const [gsErr,setGsErr]=useState('');

  const loadAll=useCallback(async()=>{
    setLoading(true);setDbErr('');
    try{
      const [s,p]=await Promise.all([DB.getStaff(),DB.getProgs()]);
      setStaff(s||[]);setProgs(p||[]);
      const m={};
      await Promise.all((p||[]).map(async pg=>{try{const a=await DB.getAtt(pg.id);m[pg.id]=(a||[]).length;}catch{m[pg.id]=0;}}));
      setAMap(m);
    }catch(e){setDbErr(e.message);}
    setLoading(false);
  },[]);

  useEffect(()=>{loadAll();},[]);

  // Load program report data when selP+sub changes
  useEffect(()=>{
    if(selP&&sub==='rep'){setPrLoad(true);DB.getAtt(selP.id).then(r=>{setPrData(r||[]);setPrLoad(false);}).catch(()=>setPrLoad(false));}
  },[selP,sub]);

  // Update stable QR URL when selected program changes (no blinking)
  useEffect(()=>{
    if(qSel){
      const exp=calcExpiry(qSel);
      const url=`${getBase()}?p=${qSel.id}&nm=${encodeURIComponent(qSel.nama)}&tp=${encodeURIComponent(qSel.tempat)}&dt=${qSel.tarikh}&hr=${qSel.hari}&mm=${encodeURIComponent(qSel.masa_mula||'')}&mt=${encodeURIComponent(qSel.masa_tamat||'')}&exp=${exp}`;
      setQUrl(url);
      setQDU('');
    }
  },[qSel]);

  const goTab=t=>{setTab(t);setSub(null);setSelP(null);setSErr('');setPErr('');setSOk('');setPOk('');if(t==='qrkod'&&progs.length>0&&!qSel){setQSel(progs[0]);}};
  const addSt=async()=>{if(!sfN.trim()||!sfK.trim())return setSErr('Sila isi semua ruangan');if(sfK.length!==12)return setSErr('No KP mestilah 12 digit');setSErr('');try{await DB.addStaff({nama:sfN.trim(),no_kp:sfK,bahagian:+sfB});setSfN('');setSfK('');setSfB('0');setSOk('Berjaya ditambah');setTimeout(()=>setSOk(''),3000);const s=await DB.getStaff();setStaff(s||[]);}catch(e){setSErr('Ralat: '+e.message);}};
  const delSt=async id=>{try{await DB.delStaff(id);setStaff(s=>s.filter(x=>x.id!==id));}catch(e){alert('Gagal: '+e.message);}};
  const addPr=async()=>{
    if(!pfN.trim()||!pfT.trim()||!pfD)return setPErr('Sila lengkapkan Nama, Tempat, dan Tarikh');
    setPErr('');
    try{
      await DB.addProg({id:gId(),nama:pfN.trim(),tempat:pfT.trim(),tarikh:pfD,hari:+pfH,masa_mula:pfMM,masa_tamat:pfMT});
      setPfN('');setPfT('');setPfD('');setPfH('1');setPfMM('08:00');setPfMT('17:00');
      setPOk('Program berjaya ditambah');setTimeout(()=>setPOk(''),3000);
      const p=await DB.getProgs();setProgs(p||[]);
    }catch(e){setPErr('Ralat: '+e.message);}
  };
  const delPr=async id=>{try{await DB.delProg(id);setProgs(p=>p.filter(x=>x.id!==id));if(qSel?.id===id){setQSel(null);setQUrl('');setQDU('');}}catch(e){alert('Gagal: '+e.message);}};
  const testGs=async()=>{setGsErr('');setGsOk('');try{await DB.getStaff();setGsOk('Sambungan berjaya!');setTimeout(()=>setGsOk(''),4000);}catch(e){setGsErr('Gagal: '+e.message);}};
  const savePin=async()=>{if(nPin.length<4)return setPmErr('Min 4 digit');await setPin(nPin);setNPin('');setPmErr('');setPmOk('PIN dikemas kini');setTimeout(()=>setPmOk(''),3000);};

  const tUtama=()=>{
    if(loading)return<Ldr/>;
    if(dbErr)return<div className="alert alert-err" style={{margin:'0 0 16px'}}><i className="ti ti-alert-circle" style={{fontSize:16,flexShrink:0}}/><div>Gagal memuat data: <strong>{dbErr}</strong><br/><span style={{fontSize:12}}>Semak sambungan Apps Script dalam Tetapan.</span></div></div>;
    const today=new Date().toISOString().slice(0,10);
    const total=Object.values(aMap).reduce((s,v)=>s+v,0);
    return<div style={{animation:'fadeUp .25s ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:22}}>
        <SC icon="users" label="Kakitangan" value={staff.length} color={BG}/>
        <SC icon="calendar-event" label="Program" value={progs.length} color="#5B1A6B"/>
        <SC icon="clipboard-check" label="Rekod Hadir" value={total} color="#0C5A3D"/>
        <SC icon="calendar-stats" label="Hari Ini" value={progs.filter(p=>p.tarikh===today).length} color="#0C3070"/>

      {progs.length>0?<><div className="sec">Program Terkini</div>
        <div className="card-sh" style={{overflow:'hidden'}}><table className="tbl"><thead><tr>
          <th style={{width:'30%'}}>Program</th><th style={{width:'18%'}}>Tempat</th><th style={{width:'18%'}}>Tarikh</th><th style={{width:'18%'}}>Masa</th><th style={{textAlign:'right'}}>Hadir</th>
        </tr></thead><tbody>{progs.slice(0,8).map(p=>{const jam=calcJam(p.masa_mula,p.masa_tamat);return(
          <tr key={p.id} onClick={()=>{setSelP(p);setSub('rep');setTab('program');}}>
            <td><div style={{fontWeight:600}}>{p.nama}</div></td>
            <td style={{color:'var(--muted)',fontSize:12}}>{p.tempat}</td>
            <td style={{color:'var(--muted)',fontSize:12}}>{HR[p.hari]}, {fds(p.tarikh)}</td>
            <td style={{color:'var(--muted)',fontSize:12}}>{p.masa_mula&&p.masa_tamat?`${p.masa_mula}–${p.masa_tamat}`:'-'}</td>
            <td style={{textAlign:'right'}}><span style={{background:BGL,color:BGD,padding:'3px 10px',borderRadius:99,fontWeight:700,fontSize:12}}>{aMap[p.id]||0} org</span></td>
          </tr>
        );})}
        </tbody></table></div>
      </>:<Mty icon="calendar-off" msg="Tiada program. Tambah dalam tab Program."/>}
    </div>;
  };

  const tKakitangan=()=>{
    if(loading)return<Ldr/>;
    return<div style={{animation:'fadeUp .25s ease',display:'grid',gridTemplateColumns:'300px 1fr',gap:20,alignItems:'start'}}>
      <div className="card" style={{padding:20}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>Tambah Kakitangan</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Tambah kakitangan yang belum ada dalam pangkalan data</div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Fld label="Nama Penuh"><input placeholder="Cth: Ahmad Bin Hassan" value={sfN} onChange={e=>setSfN(e.target.value)}/></Fld>
          <Fld label="No. Kad Pengenalan"><input placeholder="12 digit tanpa sempang" value={sfK} maxLength={12} onChange={e=>setSfK(e.target.value.replace(/\D/g,''))}/></Fld>
          <Fld label="Bahagian"><select value={sfB} onChange={e=>setSfB(e.target.value)}>{BAH.map((b,i)=><option key={i} value={i}>{b}</option>)}</select></Fld>
          {sErr&&<div className="alert alert-err"><i className="ti ti-alert-circle" style={{fontSize:14,flexShrink:0}}/>{sErr}</div>}
          {sOk&&<div className="alert alert-ok"><i className="ti ti-check" style={{fontSize:14,flexShrink:0}}/>{sOk}</div>}
          <button className="btn btn-p btn-block" onClick={addSt}><i className="ti ti-user-plus" style={{fontSize:16}}/>Tambah ke Pangkalan Data</button>
        </div>
      </div>
      <div>
        <div className="sec">{staff.length} kakitangan dalam pangkalan data</div>
        {staff.length===0?<div className="card-sh"><Mty icon="users" msg="Belum ada kakitangan."/></div>
        :<div className="card-sh" style={{overflow:'hidden'}}><table className="tbl"><thead><tr>
          <th style={{width:'42%'}}>Nama</th><th style={{width:'28%'}}>No. KP</th><th style={{width:'22%'}}>Bahagian</th><th style={{width:44}}></th>
        </tr></thead><tbody>{staff.map(s=>(
          <tr key={s.id} style={{cursor:'default'}}>
            <td><div style={{display:'flex',alignItems:'center',gap:9}}><div style={{width:30,height:30,borderRadius:8,background:BGL,color:BGD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{s.nama.trim().split(' ').slice(0,2).map(n=>n[0]||'').join('').toUpperCase()||'?'}</div><span style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.nama}</span></div></td>
            <td style={{fontFamily:'monospace',fontSize:12,color:'var(--muted)'}}>{s.no_kp}</td>
            <td><Bdg l={BAH[s.bahagian]} i={s.bahagian}/></td>
            <td style={{textAlign:'right'}}><button className="btn-icon" onClick={()=>delSt(s.id)}><i className="ti ti-trash" style={{fontSize:14}}/></button></td>
          </tr>
        ))}</tbody></table></div>}
      </div>
    </div>;
  };

  const tProgRep=()=>{

    return<div style={{animation:'fadeUp .2s ease'}}>
      <button className="btn btn-g btn-sm" onClick={()=>setSub(null)} style={{marginBottom:16}}><i className="ti ti-arrow-left" style={{fontSize:14}}/>Kembali</button>
      <div style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:16,alignItems:'start'}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,marginBottom:3}}>{selP.nama}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:3}}>{selP.tempat}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:3}}>{HR[selP.hari]}, {fd(selP.tarikh)}</div>
          {selP.masa_mula&&selP.masa_tamat&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:jam?3:14}}>{selP.masa_mula} — {selP.masa_tamat}</div>}
          {jam&&<div style={{fontSize:12,fontWeight:600,color:BG,marginBottom:14}}>{jam}</div>}
          {[{l:'Jumlah Hadir',v:prData.length,bg:BGL,col:BG,tc:BGD},...BAH.map((b,i)=>({l:b,v:prData.filter(r=>r.bahagian===i||r.bahagian===String(i)).length,bg:'var(--page)',col:'var(--text)',tc:'var(--muted)'}))].map((x,i)=>(
            <div key={i} className="card" style={{padding:'10px 14px',marginBottom:8,background:x.bg,borderColor:i===0?'rgba(139,26,46,.2)':'var(--border)'}}><div style={{fontSize:22,fontWeight:700,color:x.col}}>{x.v}</div><div style={{fontSize:11,color:x.tc,fontWeight:500}}>{x.l}</div></div>
          ))}
          <button className="btn btn-g btn-block btn-sm" style={{marginTop:4}} onClick={()=>{setQSel(selP);goTab('qrkod');}}><i className="ti ti-qrcode" style={{fontSize:14}}/>Jana Kod QR</button>
        </div>

          <th style={{width:32}}>#</th><th>Nama</th><th style={{width:90}}>Bahagian</th><th style={{width:60,textAlign:'right'}}>Masa</th>
        </tr></thead><tbody>{prData.map((r,i)=>(
          <tr key={r.id||i} style={{cursor:'default'}}>

            <td>{r.bahagian!=null&&r.bahagian!==''?<Bdg l={BAH[+r.bahagian]} i={+r.bahagian}/>:<span style={{fontSize:11,color:'var(--dim)'}}>—</span>}</td>
            <td style={{textAlign:'right',color:'var(--muted)',fontSize:12}}>{r.masa?ft(r.masa):''}</td>
          </tr>
        ))}</tbody></table></div>}
      </div>
    </div>;
  };

  const tProgram=()=>{
    if(sub==='rep'&&selP)return tProgRep();
    if(loading)return<Ldr/>;
    return<div style={{animation:'fadeUp .25s ease',display:'grid',gridTemplateColumns:'320px 1fr',gap:20,alignItems:'start'}}>
      <div className="card" style={{padding:20}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>Tambah Program</div>

  try{
    const p=e.parameter,a=p.action;let r;

    else if(a==='delKakitangan'){delId('kakitangan',p.id);r={ok:true};}
    else if(a==='findByKP')    r=sArr('kakitangan').filter(x=>x.no_kp===p.no_kp);
    else if(a==='getProgram')  r=sArr('program').reverse();
    else if(a==='addProgram'){
      aRow('program',[p.id,p.nama,p.tempat,p.tarikh,+p.hari,p.masa_mula||'',p.masa_tamat||'',now()]);
      r={ok:true};

    else if(a==='delProgram')  {delId('program',p.id);r={ok:true};}
    else if(a==='getKehadiran') r=sArr('kehadiran').filter(x=>x.program_id===p.program_id);

    else r={error:'Unknown: '+a};
    return out(r);
  }catch(err){return out({error:err.toString()});}
}
function out(d){return ContentService.createTextOutput(JSON.stringify(d)).setMimeType(ContentService.MimeType.JSON);}
const SS=SpreadsheetApp.getActiveSpreadsheet();
const HD={
  kakitangan:['id','nama','no_kp','bahagian','created_at'],
  program:['id','nama','tempat','tarikh','hari','masa_mula','masa_tamat','created_at'],
  kehadiran:['id','program_id','kakitangan_id','no_kp','nama','bahagian','masa','verified']
};
function gs(n){let s=SS.getSheetByName(n);if(!s){s=SS.insertSheet(n);s.getRange(1,1,1,HD[n].length).setValues([HD[n]]);s.setFrozenRows(1);}return s;}
function sArr(n){const d=gs(n).getDataRange().getValues();if(d.length<2)return[];const h=d[0];return d.slice(1).map(r=>Object.fromEntries(h.map((k,i)=>[k,r[i]])));}
function aRow(n,row){gs(n).appendRow(row);}
function delId(n,id){const s=gs(n);const ids=s.getRange(1,1,s.getLastRow(),1).getValues().flat();const i=ids.indexOf(id);if(i>0)s.deleteRow(i+1);}
function now(){return new Date().toISOString();}`;

      </div>
      <div className="fld"><label className="lbl">PIN Admin</label>
        <input type="password" inputMode="numeric" placeholder="&#9679; &#9679; &#9679; &#9679;" value={pIn} maxLength={8}
          onChange={e=>{setPIn(e.target.value.replace(/\D/g,''));setPErr('');}}
          onKeyDown={e=>e.key==='Enter'&&tryAdmin()}
          style={{fontSize:28,padding:'14px 18px',textAlign:'center',letterSpacing:8,borderColor:pErr?'var(--err)':'var(--border)'}}/>
      </div>
      {pErr&&<div className="alert alert-err" style={{marginTop:9}}><i className="ti ti-alert-circle" style={{fontSize:14,flexShrink:0}}/>{pErr}</div>}
      <button className="btn btn-p btn-block" style={{marginTop:14,padding:'13px',fontSize:15}} onClick={tryAdmin}><i className="ti ti-login" style={{fontSize:18}}/>Log Masuk</button>
      <button onClick={()=>{setMode('kakitangan');setPIn('');setPErr('');}} style={{marginTop:10,width:'100%',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:13,padding:'6px'}}>← Kembali ke Daftar Kehadiran</button>
      <div style={{textAlign:'center',marginTop:8,fontSize:11,color:'var(--dim)'}}>PIN lalai: <strong style={{color:'var(--muted)'}}>1234</strong></div>
    </div>
  </div>;
  if(mode==='admin')return<Admin pin={pin} setPin={updPin} onBack={()=>setMode('kakitangan')}/>;
  return<KView onAdmin={()=>{setPIn('');setPErr('');setMode('pin');}}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
