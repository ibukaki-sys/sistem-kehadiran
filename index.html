<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistem Kehadiran — SMK Haji Abdul Rahman Limbong</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.33.0/dist/tabler-icons.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:    #8B1A2E;
      --bgl:   #F9E5E8;
      --bgd:   #5C0016;
      --side:  #3D0A18;
      --hover: #C4384F;
      --pale:  #FDEDF0;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f7f2f3;color:#1a0810;min-height:100vh}
    #root{max-width:960px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 40px rgba(139,26,46,.12)}
    input,select,button{font-family:inherit}
    input,select{display:block;width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid #e8d5d9;background:#fdf8f9;font-size:14px;color:#1a0810;outline:none;transition:border .15s,box-shadow .15s}
    input:focus,select:focus{border-color:var(--bg);background:#fff;box-shadow:0 0 0 3px rgba(139,26,46,.1)}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    .hr:hover{background:#fdf5f6!important;cursor:pointer}
    .ni:hover{background:rgba(255,255,255,.09)!important}
    .prog-card:hover{border-color:var(--bg)!important;box-shadow:0 4px 16px rgba(139,26,46,.12)!important}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const BG='#8B1A2E',BGL='#F9E5E8',BGD='#5C0016',SIDE='#3D0A18';
const BAH=['Pengurusan','Guru','Pentadbiran'];
const HR=['Ahad','Isnin','Selasa','Rabu','Khamis','Jumaat','Sabtu'];
const BC=[{bg:'#F0E6F0',col:'#5B1A6B'},{bg:'#F9E5E8',col:'#5C0016'},{bg:'#E6EEF9',col:'#0C3070'}];
const SK={ST:'smk_st3',PR:'smk_pr3',AT:'smk_at3',PIN:'smk_pin3'};
const SCHOOL='SMK Haji Abdul Rahman Limbong';
const DEF_PIN='1234';

const gId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6).toUpperCase();
async function ld(k,s){try{const v=localStorage.getItem(k);if(v){s(JSON.parse(v));return true;}return false;}catch{return false;}}
async function sv(k,d){try{localStorage.setItem(k,JSON.stringify(d));}catch{}}
const fd=d=>new Date(d+'T00:00').toLocaleDateString('ms-MY',{day:'2-digit',month:'long',year:'numeric'});
const fds=d=>new Date(d+'T00:00').toLocaleDateString('ms-MY',{day:'2-digit',month:'short',year:'numeric'});
const ft=ts=>new Date(ts).toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit'});

/* Get base URL for QR links */
function getBaseUrl(){
  const {origin,pathname}=window.location;
  return origin+pathname.replace(/\/[^/]*$/,'/')+pathname.split('/').pop();
}

/* Parse program from URL params */
function getProgramFromURL(){
  const p=new URLSearchParams(window.location.search);
  if(!p.get('p'))return null;
  return{
    id:p.get('p')||'',
    nama:decodeURIComponent(p.get('nm')||''),
    tempat:decodeURIComponent(p.get('tp')||''),
    tarikh:p.get('dt')||'',
    hari:parseInt(p.get('hr')||'0'),
    fromUrl:true,
  };
}

function Bdg({l,i}){const c=BC[i%3];return<span style={{background:c.bg,color:c.col,fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:99,whiteSpace:'nowrap'}}>{l}</span>;}

/* QRGen — URL-based, scannable by any camera app */
function QRGen({data,size=220,wrapRef}){
  const localRef=useRef();
  const ref=wrapRef||localRef;
  useEffect(()=>{
    if(!ref.current||!window.QRCode||!data)return;
    ref.current.innerHTML='';
    const c=document.createElement('canvas');
    ref.current.appendChild(c);
    window.QRCode.toCanvas(c,data,{width:size,margin:2,color:{dark:'#3D0A18',light:'#fff'}},()=>{});
  },[data,size]);
  return<div ref={ref} style={{lineHeight:0}}/>;
}

/* Download branded PNG */
function downloadQR(prog,wrapEl,qrUrl){
  const canvas=wrapEl?.querySelector('canvas');
  if(!canvas){alert('QR belum dijana. Sila tunggu sebentar.');return;}
  const W=440,H=580;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  // Header
  ctx.fillStyle=SIDE;ctx.fillRect(0,0,W,72);
  ctx.fillStyle='rgba(255,255,255,.45)';ctx.font='9px Arial';ctx.textAlign='center';
  ctx.fillText(SCHOOL.toUpperCase(),W/2,18);
  ctx.fillStyle='#fff';ctx.font='bold 14px Arial';
  ctx.fillText('SISTEM KEHADIRAN PROGRAM',W/2,40);
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.font='10px Arial';
  ctx.fillText('Imbas kod QR untuk daftar kehadiran',W/2,58);
  // QR
  const qs=270,qx=(W-qs)/2;ctx.drawImage(canvas,qx,88,qs,qs);
  // Accent bar
  ctx.fillStyle=BG;ctx.fillRect(qx,88+qs+8,qs,3);
  // Info area
  ctx.fillStyle='#fdf5f6';ctx.fillRect(0,88+qs+20,W,H-(88+qs+20));
  ctx.fillStyle='#1a0810';ctx.font='bold 16px Arial';ctx.textAlign='center';
  const nm=prog.nama.length>38?prog.nama.slice(0,35)+'…':prog.nama;
  ctx.fillText(nm,W/2,88+qs+54);
  ctx.fillStyle='#6b2535';ctx.font='12px Arial';
  ctx.fillText(prog.tempat,W/2,88+qs+76);
  ctx.fillText(`${HR[prog.hari]}, ${fd(prog.tarikh)}`,W/2,88+qs+96);
  ctx.setLineDash([3,3]);ctx.strokeStyle='#e8d0d5';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(40,88+qs+112);ctx.lineTo(W-40,88+qs+112);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#a06070';ctx.font='10px Arial';
  ctx.fillText('Imbas dengan kamera telefon atau mana-mana apl QR',W/2,88+qs+132);
  // Footer
  ctx.fillStyle=BG;ctx.fillRect(0,H-6,W,6);
  ctx.strokeStyle='#e8d0d5';ctx.lineWidth=1;ctx.strokeRect(.5,.5,W-1,H-1);
  const a=document.createElement('a');
  a.download=`QR-${prog.nama.replace(/\s+/g,'-')}.png`;a.href=c.toDataURL('image/png');a.click();
}

/* Print QR */
function printQR(prog,wrapEl){
  const canvas=wrapEl?.querySelector('canvas');
  if(!canvas)return;
  const du=canvas.toDataURL('image/png');
  const w=window.open('','_blank','width=520,height=720');
  w.document.write(`<!DOCTYPE html><html><head><title>QR — ${prog.nama}</title>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f0f1;padding:20px}
  .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 6px 32px rgba(139,26,46,.15);width:360px;text-align:center}
  .hdr{background:#3D0A18;padding:20px 20px 15px}.sch{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
  .ttl{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px}.sub{font-size:10px;color:rgba(255,255,255,.4)}
  .qw{padding:20px 20px 6px;display:flex;justify-content:center}
  .qw img{width:220px;height:220px;display:block}.bar{height:3px;background:#8B1A2E;margin:0 22px}
  .inf{padding:16px 22px 20px;background:#fdf5f6}.inf h2{font-size:15px;font-weight:700;color:#1a0810;margin-bottom:5px}
  .inf p{font-size:12px;color:#6b2535;margin:3px 0}.nt{font-size:10px;color:#a06070;margin-top:12px;padding-top:10px;border-top:1px dashed #e8d0d5;line-height:1.5}
  .ft{background:#8B1A2E;height:5px}@media print{body{background:#fff;padding:0}}</style>
  </head><body><div class="card">
  <div class="hdr"><div class="sch">${SCHOOL}</div><div class="ttl">SISTEM KEHADIRAN PROGRAM</div><div class="sub">Imbas dengan mana-mana apl kamera</div></div>
  <div class="qw"><img src="${du}"/></div><div class="bar"></div>
  <div class="inf"><h2>${prog.nama}</h2><p>${prog.tempat}</p><p>${HR[prog.hari]}, ${fd(prog.tarikh)}</p>
  <p class="nt">Imbas kod QR ini menggunakan kamera telefon atau apl QR scanner. Laman web pendaftaran kehadiran akan dibuka secara automatik.</p></div>
  <div class="ft"></div></div><script>setTimeout(()=>window.print(),400)<\/script></body></html>`);
  w.document.close();
}

/* QR Scanner component */
function QRScanner({onScan,onCancel}){
  const vR=useRef(),cR=useRef(),rafR=useRef(),stR=useRef();
  const [st,setSt]=useState('init');
  useEffect(()=>{
    (async()=>{
      try{
        const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
        stR.current=s;
        if(vR.current){vR.current.srcObject=s;await vR.current.play();setSt('ok');tick();}
      }catch{setSt('err');}
    })();
    return()=>{cancelAnimationFrame(rafR.current);stR.current?.getTracks().forEach(t=>t.stop());};
  },[]);
  function tick(){
    const v=vR.current,c=cR.current;
    if(!v||!c){rafR.current=requestAnimationFrame(tick);return;}
    if(v.readyState===v.HAVE_ENOUGH_DATA&&window.jsQR){
      c.width=v.videoWidth;c.height=v.videoHeight;
      const ctx=c.getContext('2d');ctx.drawImage(v,0,0);
      const img=ctx.getImageData(0,0,c.width,c.height);
      const res=window.jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(res){stR.current?.getTracks().forEach(t=>t.stop());onScan(res.data);return;}
    }
    rafR.current=requestAnimationFrame(tick);
  }
  return(
    <div style={{position:'relative'}}>
      <video ref={vR} playsInline muted style={{width:'100%',borderRadius:16,display:st==='ok'?'block':'none'}}/>
      <canvas ref={cR} style={{display:'none'}}/>
      {st==='init'&&<div style={{padding:52,textAlign:'center',color:'#a06070',fontSize:14}}>Membuka kamera...</div>}
      {st==='err'&&<div style={{padding:36,textAlign:'center'}}>
        <i className="ti ti-camera-off" style={{fontSize:44,color:'#c4a0a8',display:'block',marginBottom:12}}/>
        <div style={{fontSize:15,color:'#6b2535',fontWeight:500,marginBottom:4}}>Kamera tidak boleh diakses</div>
        <div style={{fontSize:13,color:'#a06070'}}>Sila gunakan kamera telefon untuk mengimbas QR kod program.</div>
      </div>}
      {st==='ok'&&<div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:200,height:200,border:`3px solid ${BG}`,borderRadius:16,pointerEvents:'none',boxShadow:`0 0 0 4000px rgba(61,10,24,.45)`}}/>}
      <button onClick={onCancel} style={{marginTop:14,width:'100%',background:'rgba(139,26,46,.08)',border:`1px solid rgba(139,26,46,.2)`,padding:'13px',borderRadius:11,cursor:'pointer',fontSize:14,color:BGD,fontWeight:600}}>Batal</button>
    </div>
  );
}

/* ══════════════════════════════════════════
   ATTENDANCE FORM  — shared by direct URL
   access and in-app scan
══════════════════════════════════════════ */
function AttendanceForm({prog,staff,att,svAt,onBack,onDone}){
  const [ic,setIc]=useState('');
  const [result,setResult]=useState(null); // null | {t:'ok',nama,bah} | {t:'nf'} | {t:'dup',nama}
  const [done,setDone]=useState(null);
  const cnt=att.filter(a=>a.pId===prog.id).length;

  const submit=async()=>{
    if(!ic.trim()||ic.length<12)return setResult({t:'short'});
    // Check staff DB — validate if available, otherwise accept
    const s=staff.find(s=>s.noKP===ic.trim());
    if(staff.length>0&&!s)return setResult({t:'nf'});
    if(att.find(a=>a.pId===prog.id&&(s?a.sId===s.id:a.noKP===ic.trim())))return setResult({t:'dup',nama:s?.nama});
    const rec={
      id:gId(),pId:prog.id,
      sId:s?.id||'',
      nama:s?.nama||'Tidak disahkan',
      bah:s?.bah??-1,
      noKP:ic.trim(),
      masa:Date.now(),
      verified:!!s,
    };
    await svAt([...att,rec]);
    setDone({nama:s?.nama||ic.trim(),bah:s?.bah,prog});
  };

  if(done)return(
    <div style={{padding:'36px 20px 28px',textAlign:'center',animation:'popIn .35s ease'}}>
      <div style={{width:90,height:90,borderRadius:'50%',background:BGL,color:BG,display:'flex',alignItems:'center',justifyContent:'center',fontSize:50,margin:'0 auto 20px',border:`2px solid rgba(139,26,46,.2)`}}>
        <i className="ti ti-check"/>
      </div>
      <div style={{fontWeight:700,fontSize:26,marginBottom:8,color:'#1a0810'}}>Terima kasih!</div>
      <div style={{fontSize:22,color:BG,fontWeight:600,marginBottom:5}}>{done.nama}</div>
      {done.bah!=null&&done.bah>=0&&<div style={{fontSize:15,color:BGD,marginBottom:5}}>{BAH[done.bah]}</div>}
      <div style={{fontSize:14,color:'#6b2535',marginBottom:5}}>{done.prog.nama}</div>
      <div style={{fontSize:13,color:'#a06070',marginBottom:5}}>{done.prog.tempat}</div>
      <div style={{fontSize:12,background:'#fdf5f6',display:'inline-block',padding:'5px 16px',borderRadius:99,color:'#a06070',marginBottom:28,border:'1px solid #e8d0d5'}}>
        <i className="ti ti-clock" style={{fontSize:12,marginRight:5}}/>
        {new Date().toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
      </div>
      {onDone&&<button onClick={onDone} style={{width:'100%',background:BG,color:'#fff',border:'none',padding:'15px',borderRadius:13,cursor:'pointer',fontWeight:700,fontSize:16,marginBottom:10}}>
        Kakitangan Seterusnya
      </button>}
      {onBack&&<button onClick={onBack} style={{width:'100%',background:'none',border:'none',color:'#a06070',padding:'9px',cursor:'pointer',fontSize:13}}>Kembali</button>}
    </div>
  );

  return(
    <div style={{padding:'22px 18px 28px',animation:'fadeUp .2s ease'}}>
      {/* Program info card */}
      <div style={{background:`linear-gradient(135deg,${SIDE} 0%,#6b1020 100%)`,borderRadius:16,padding:'16px 18px',marginBottom:24,color:'#fff'}}>
        <div style={{fontSize:9,color:'rgba(255,255,255,.4)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:5}}>{SCHOOL}</div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:6}}>{prog.nama}</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:12,fontSize:12,color:'rgba(255,255,255,.7)'}}>
          <span><i className="ti ti-map-pin" style={{fontSize:11,marginRight:4}}/>{prog.tempat}</span>
          <span><i className="ti ti-calendar" style={{fontSize:11,marginRight:4}}/>{HR[prog.hari]}, {fds(prog.tarikh)}</span>
          <span><i className="ti ti-users" style={{fontSize:11,marginRight:4}}/>{cnt} hadir</span>
        </div>
      </div>

      <div style={{fontSize:16,fontWeight:600,marginBottom:5,color:'#1a0810'}}>No. Kad Pengenalan</div>
      <div style={{fontSize:13,color:'#a06070',marginBottom:14}}>Masukkan 12 digit No. KP anda tanpa sempang</div>

      <input
        placeholder="901231125432"
        value={ic} maxLength={12} inputMode="numeric"
        onChange={e=>{setIc(e.target.value.replace(/\D/g,''));setResult(null);}}
        onKeyDown={e=>e.key==='Enter'&&submit()}
        style={{fontSize:24,padding:'15px 16px',borderRadius:13,border:`2px solid ${result?.t==='nf'||result?.t==='short'?'#dc2626':'#e8d5d9'}`,background:'#fdf8f9',letterSpacing:3,marginBottom:13,textAlign:'center'}}
      />

      <button onClick={submit} style={{width:'100%',background:BG,color:'#fff',border:'none',padding:'15px',borderRadius:13,cursor:'pointer',fontWeight:700,fontSize:17,marginBottom:12,boxShadow:'0 3px 16px rgba(139,26,46,.3)'}}>
        Daftar Hadir
      </button>

      {result?.t==='short'&&<div style={{background:'#FEF2F2',color:'#991B1B',padding:'12px 15px',borderRadius:11,fontSize:14,textAlign:'center',border:'1px solid #FECACA',marginBottom:8}}>
        <i className="ti ti-alert-circle" style={{fontSize:18,display:'block',margin:'0 auto 4px'}}/>No. KP mestilah 12 digit.
      </div>}
      {result?.t==='nf'&&<div style={{background:'#FEF2F2',color:'#991B1B',padding:'12px 15px',borderRadius:11,fontSize:14,textAlign:'center',border:'1px solid #FECACA',marginBottom:8}}>
        <i className="ti ti-alert-circle" style={{fontSize:18,display:'block',margin:'0 auto 4px'}}/>No KP tidak dijumpai dalam sistem. Sila hubungi pentadbir.
      </div>}
      {result?.t==='dup'&&<div style={{background:'#FFFBEB',color:'#92400E',padding:'12px 15px',borderRadius:11,fontSize:14,textAlign:'center',border:'1px solid #FDE68A',marginBottom:8}}>
        <i className="ti ti-alert-triangle" style={{fontSize:18,display:'block',margin:'0 auto 4px'}}/>{result.nama||'Kakitangan ini'} sudah mendaftar hadir untuk program ini.
      </div>}

      {onBack&&<button onClick={onBack} style={{width:'100%',background:'none',border:'none',color:'#a06070',padding:'8px',cursor:'pointer',fontSize:13,marginTop:4}}>
        Kembali
      </button>}
    </div>
  );
}

/* ══════════════════════════════════════════
   KAKITANGAN VIEW — mobile first
   QR scan only, no program list
══════════════════════════════════════════ */
function KakitanganView({staff,progs,att,svAt,onAdmin}){
  const [screen,setScreen]=useState('home'); // home | scanning | attend | done
  const [prog,setProg]=useState(null);

  const handleScan=data=>{
    // Accept URL-based QR from this app
    try{
      const url=new URL(data);
      const p=url.searchParams;
      if(p.get('p')){
        setProg({
          id:p.get('p'),
          nama:decodeURIComponent(p.get('nm')||''),
          tempat:decodeURIComponent(p.get('tp')||''),
          tarikh:p.get('dt')||'',
          hari:parseInt(p.get('hr')||'0'),
        });
        setScreen('attend');
        return;
      }
    }catch{}
    // Legacy format: HADIR:ID
    if(data.startsWith('HADIR:')){
      const pid=data.slice(6);
      const found=progs.find(p=>p.id===pid);
      if(found){setProg(found);setScreen('attend');return;}
    }
    setScreen('invalid');
  };

  return(
    <div style={{minHeight:'100vh',background:'#fff'}}>
      {/* Header */}
      <div style={{background:SIDE,padding:'14px 18px 13px',display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:'rgba(255,255,255,.4)',letterSpacing:'.07em',textTransform:'uppercase'}}>{SCHOOL}</div>
          <div style={{fontSize:16,fontWeight:700,color:'#fff',marginTop:1}}>Daftar Kehadiran</div>
        </div>
        <button onClick={onAdmin} style={{background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.15)',borderRadius:8,padding:'6px 12px',cursor:'pointer',color:'rgba(255,255,255,.65)',fontSize:11,display:'flex',alignItems:'center',gap:5,flexShrink:0,fontWeight:500}}>
          <i className="ti ti-shield-lock" style={{fontSize:12}}/>Admin
        </button>
      </div>

      {screen==='home'&&(
        <div style={{padding:'32px 20px 36px',animation:'fadeUp .25s ease'}}>
          <div style={{textAlign:'center',marginBottom:32}}>
            <div style={{fontSize:15,color:'#6b2535',marginBottom:6,fontWeight:500}}>Selamat datang</div>
            <div style={{fontSize:13,color:'#a06070'}}>Imbas kod QR yang dipaparkan oleh pentadbir</div>
          </div>

          {/* Big scan button */}
          <button onClick={()=>setScreen('scanning')}
            style={{width:'100%',background:`linear-gradient(160deg,${BG} 0%,#B5243D 100%)`,border:'none',borderRadius:22,padding:'32px 20px',cursor:'pointer',textAlign:'center',display:'block',boxShadow:'0 6px 28px rgba(139,26,46,.4)',marginBottom:28}}>
            <div style={{width:72,height:72,borderRadius:'50%',background:'rgba(255,255,255,.18)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
              <i className="ti ti-qrcode-scan" style={{fontSize:36,color:'#fff'}}/>
            </div>
            <div style={{fontSize:20,fontWeight:700,color:'#fff',marginBottom:4}}>Imbas Kod QR</div>
            <div style={{fontSize:13,color:'rgba(255,255,255,.7)'}}>Buka kamera &amp; arahkan ke kod QR program</div>
          </button>

          <div style={{background:'#fdf5f6',borderRadius:14,padding:'14px 16px',border:'1px solid #e8d0d5'}}>
            <div style={{fontSize:12,fontWeight:600,color:BGD,marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
              <i className="ti ti-info-circle" style={{fontSize:14}}/> Cara pendaftaran
            </div>
            {[['qrcode','Dapatkan kod QR daripada pentadbir'],['scan','Imbas menggunakan apl ini atau kamera telefon'],['id','Masukkan No. Kad Pengenalan anda'],['circle-check','Kehadiran direkod secara automatik']].map(([ic,t],i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:i<3?8:0}}>
                <div style={{width:22,height:22,borderRadius:'50%',background:BG,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
                <div style={{fontSize:13,color:'#6b2535'}}>{t}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {screen==='scanning'&&(
        <div style={{padding:'20px 18px',animation:'fadeUp .2s ease'}}>
          <button onClick={()=>setScreen('home')} style={{background:'none',border:'none',cursor:'pointer',color:BG,padding:'0 0 14px',display:'flex',alignItems:'center',gap:5,fontSize:14,fontWeight:600}}>
            <i className="ti ti-arrow-left"/> Kembali
          </button>
          <div style={{fontSize:14,color:'#6b2535',marginBottom:14,textAlign:'center',fontWeight:500}}>Arahkan kamera ke kod QR program</div>
          <QRScanner onScan={handleScan} onCancel={()=>setScreen('home')}/>
        </div>
      )}

      {screen==='attend'&&prog&&(
        <AttendanceForm
          prog={prog} staff={staff} att={att} svAt={svAt}
          onBack={()=>{setScreen('home');setProg(null);}}
          onDone={()=>{setScreen('attend');/* reset IC */}}
        />
      )}

      {screen==='invalid'&&(
        <div style={{padding:'50px 20px',textAlign:'center',animation:'fadeUp .2s ease'}}>
          <i className="ti ti-qrcode-off" style={{fontSize:60,color:'#c4a0a8',display:'block',marginBottom:14}}/>
          <div style={{fontWeight:700,fontSize:20,marginBottom:8,color:'#1a0810'}}>Kod QR Tidak Sah</div>
          <div style={{fontSize:14,color:'#a06070',marginBottom:28,lineHeight:1.6}}>QR ini tidak dikenali. Sila dapatkan kod QR yang betul daripada pentadbir.</div>
          <button onClick={()=>setScreen('home')} style={{background:BG,color:'#fff',border:'none',padding:'14px 32px',borderRadius:13,cursor:'pointer',fontSize:15,fontWeight:700}}>Cuba Lagi</button>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   ADMIN PANEL — desktop first
══════════════════════════════════════════ */
function AdminPanel({staff,progs,att,svSt,svPr,svAt,pin,setPin,onBack}){
  const [tab,setTab]=useState('utama');
  const [sub,setSub]=useState(null);
  const [selP,setSelP]=useState(null);
  const qrWrapRef=useRef(null);

  /* Kakitangan form state */
  const [sfNama,setSfNama]=useState('');
  const [sfKP,setSfKP]=useState('');
  const [sfBah,setSfBah]=useState('0');
  const [sErr,setSErr]=useState('');const [sOk,setSOk]=useState('');

  /* Program form state */
  const [pfNama,setPfNama]=useState('');
  const [pfTempat,setPfTempat]=useState('');
  const [pfTarikh,setPfTarikh]=useState('');
  const [pfHari,setPfHari]=useState('1');
  const [pErr,setPErr]=useState('');const [pOk,setPOk]=useState('');

  /* Laporan */
  const [repP,setRepP]=useState('');

  /* QR tab */
  const [qrSel,setQrSel]=useState(null);

  /* PIN */
  const [nPin,setNPin]=useState('');
  const [pmErr,setPmErr]=useState('');const [pmOk,setPmOk]=useState('');

  const goTab=t=>{
    setTab(t);setSub(null);setSelP(null);
    setSErr('');setPErr('');setSOk('');setPOk('');
    if(t==='qrkod'&&!qrSel){
      const s=[...progs].sort((a,b)=>b.cAt-a.cAt);
      if(s[0])setQrSel(s[0]);
    }
  };

  const addSt=async()=>{
    if(!sfNama.trim()||!sfKP.trim())return setSErr('Sila isi semua ruangan');
    if(sfKP.length!==12)return setSErr('No KP mestilah 12 digit');
    if(staff.find(s=>s.noKP===sfKP))return setSErr('No KP sudah didaftarkan');
    await svSt([...staff,{id:gId(),nama:sfNama.trim(),noKP:sfKP,bah:+sfBah}]);
    setSfNama('');setSfKP('');setSfBah('0');setSErr('');
    setSOk('Berjaya didaftarkan!');setTimeout(()=>setSOk(''),3000);
  };
  const addPr=async()=>{
    if(!pfNama.trim()||!pfTempat.trim()||!pfTarikh)return setPErr('Sila isi semua ruangan');
    await svPr([...progs,{id:gId(),nama:pfNama.trim(),tempat:pfTempat.trim(),tarikh:pfTarikh,hari:+pfHari,cAt:Date.now()}]);
    setPfNama('');setPfTempat('');setPfTarikh('');setPfHari('1');setPErr('');
    setPOk('Program berjaya ditambah!');setTimeout(()=>setPOk(''),3000);
  };
  const delSt=async id=>svSt(staff.filter(s=>s.id!==id));
  const delPr=async id=>{
    await svPr(progs.filter(p=>p.id!==id));
    await svAt(att.filter(a=>a.pId!==id));
    if(qrSel?.id===id)setQrSel(null);
  };
  const savePin=async()=>{
    if(nPin.length<4)return setPmErr('Sekurang-kurangnya 4 digit');
    await setPin(nPin);setNPin('');setPmErr('');
    setPmOk('PIN berjaya dikemas kini!');setTimeout(()=>setPmOk(''),3000);
  };

  const sLbl=tx=><div style={{fontSize:11,fontWeight:600,color:'#6b2535',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:9}}>{tx}</div>;
  const sc=(ic,l,v,c)=>(
    <div style={{background:'#fdf5f6',borderRadius:10,padding:'12px 14px',display:'flex',alignItems:'center',gap:10,border:'1px solid #e8d0d5'}}>
      <div style={{width:36,height:36,borderRadius:9,background:c+'18',color:c,display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,flexShrink:0}}><i className={`ti ti-${ic}`}/></div>
      <div><div style={{fontSize:21,fontWeight:700,lineHeight:1.1,color:'#1a0810'}}>{v}</div><div style={{fontSize:11,color:'#a06070',marginTop:1}}>{l}</div></div>
    </div>
  );

  /* ── UTAMA ── */
  const tabUtama=()=>{
    const tod=new Date().toISOString().slice(0,10);
    const rec=[...progs].sort((a,b)=>b.cAt-a.cAt).slice(0,8);
    return(
      <div style={{animation:'fadeUp .2s ease'}}>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:700,marginBottom:3,color:'#1a0810'}}>Papan Pemuka</div>
          <div style={{fontSize:13,color:'#a06070'}}>{new Date().toLocaleDateString('ms-MY',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:9,marginBottom:20}}>
          {sc('users','Kakitangan',staff.length,BG)}
          {sc('calendar-event','Program',progs.length,'#5B1A6B')}
          {sc('clipboard-check','Rekod Hadir',att.length,'#0C5A3D')}
          {sc('calendar-stats','Hari Ini',progs.filter(p=>p.tarikh===tod).length,'#0C3070')}
        </div>
        {rec.length>0&&<>
          {sLbl('Program Terkini')}
          <div style={{border:'1px solid #e8d0d5',borderRadius:10,overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead><tr style={{background:'#fdf5f6'}}>
                {['Program','Tempat','Tarikh','Hadir'].map((h,i)=>(
                  <th key={i} style={{padding:'8px 12px',textAlign:i===3?'right':'left',fontWeight:600,fontSize:11,color:'#6b2535'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{rec.map((p,i)=>{const cnt=att.filter(a=>a.pId===p.id).length;return(
                <tr key={p.id} className="hr" onClick={()=>{setSelP(p);setSub('rep');setTab('program');}} style={{borderTop:i>0?'1px solid #f5e8eb':'none'}}>
                  <td style={{padding:'9px 12px',fontWeight:500,color:'#1a0810'}}>{p.nama}</td>
                  <td style={{padding:'9px 12px',color:'#6b2535'}}>{p.tempat}</td>
                  <td style={{padding:'9px 12px',color:'#6b2535'}}>{HR[p.hari]}, {fds(p.tarikh)}</td>
                  <td style={{padding:'9px 12px',textAlign:'right'}}>
                    <span style={{background:BGL,color:BGD,padding:'2px 10px',borderRadius:99,fontWeight:600,fontSize:12}}>{cnt}</span>
                  </td>
                </tr>
              );})}
            </tbody></table>
          </div>
        </>}
        {progs.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:'#c4a0a8'}}>
          <i className="ti ti-calendar-off" style={{fontSize:40,display:'block',marginBottom:10}}/>
          <div style={{fontSize:14}}>Tiada program. Tambah program baharu dalam tab Program.</div>
        </div>}
      </div>
    );
  };

  /* ── KAKITANGAN ── */
  const tabKakitangan=()=>(
    <div style={{animation:'fadeUp .2s ease',display:'grid',gridTemplateColumns:'290px 1fr',gap:18,alignItems:'start'}}>
      <div style={{background:'#fff',border:'1px solid #e8d0d5',borderRadius:10,padding:16}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:13,paddingBottom:10,borderBottom:'1px solid #f5e8eb',color:'#3D0A18'}}>Tambah Kakitangan Baharu</div>
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          <input placeholder="Nama penuh" value={sfNama} onChange={e=>setSfNama(e.target.value)}/>
          <input placeholder="No. KP (12 digit, tanpa sempang)" value={sfKP} maxLength={12}
            onChange={e=>setSfKP(e.target.value.replace(/\D/g,''))}/>
          <select value={sfBah} onChange={e=>setSfBah(e.target.value)}>
            {BAH.map((b,i)=><option key={i} value={i}>{b}</option>)}
          </select>
          {sErr&&<div style={{fontSize:12,color:'#dc2626'}}>{sErr}</div>}
          {sOk&&<div style={{fontSize:12,color:'#0C5A3D',fontWeight:500}}>{sOk}</div>}
          <button onClick={addSt} style={{background:BG,color:'#fff',border:'none',padding:'10px 14px',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            <i className="ti ti-user-plus"/>Daftar Kakitangan
          </button>
        </div>
      </div>
      <div>
        {sLbl(`${staff.length} Kakitangan Berdaftar`)}
        {staff.length===0
          ?<div style={{textAlign:'center',padding:'36px',color:'#c4a0a8',border:'1px solid #e8d0d5',borderRadius:10}}>
            <i className="ti ti-users" style={{fontSize:34,display:'block',marginBottom:8}}/>Tiada kakitangan
          </div>
          :<div style={{border:'1px solid #e8d0d5',borderRadius:10,overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,tableLayout:'fixed'}}>
              <thead><tr style={{background:'#fdf5f6'}}>
                <th style={{padding:'8px 12px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535',width:'38%'}}>Nama</th>
                <th style={{padding:'8px 12px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535',width:'30%'}}>No. KP</th>
                <th style={{padding:'8px 12px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535',width:'22%'}}>Bahagian</th>
                <th style={{padding:'8px 12px',width:'10%'}}></th>
              </tr></thead>
              <tbody>{staff.map((s,i)=>(
                <tr key={s.id} className="hr" style={{borderTop:i>0?'1px solid #f5e8eb':'none'}}>
                  <td style={{padding:'9px 12px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{width:28,height:28,borderRadius:'50%',background:BGL,color:BGD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>
                        {s.nama.trim().split(' ').slice(0,2).map(n=>n[0]||'').join('').toUpperCase()||'?'}
                      </div>
                      <span style={{fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#1a0810'}}>{s.nama}</span>
                    </div>
                  </td>
                  <td style={{padding:'9px 12px',color:'#6b2535',fontFamily:'monospace',fontSize:12}}>{s.noKP}</td>
                  <td style={{padding:'9px 12px'}}><Bdg l={BAH[s.bah]} i={s.bah}/></td>
                  <td style={{padding:'9px 12px',textAlign:'center'}}>
                    <button onClick={()=>delSt(s.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#c4a0a8',padding:3}}>
                      <i className="ti ti-trash" style={{fontSize:14}}/>
                    </button>
                  </td>
                </tr>
              ))}
            </tbody></table>
          </div>
        }
      </div>
    </div>
  );

  /* ── PROGRAM ── */
  const tabProgRep=()=>{
    if(!selP)return null;
    const recs=[...att.filter(a=>a.pId===selP.id)].sort((a,b)=>a.masa-b.masa);
    return(
      <div style={{animation:'fadeUp .2s ease'}}>
        <button onClick={()=>setSub(null)} style={{background:'none',border:'none',cursor:'pointer',color:BG,padding:'0 0 12px',display:'flex',alignItems:'center',gap:5,fontSize:13,fontWeight:600}}>
          <i className="ti ti-arrow-left"/> Kembali
        </button>
        <div style={{display:'grid',gridTemplateColumns:'195px 1fr',gap:16,alignItems:'start'}}>
          <div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:3,color:'#1a0810'}}>{selP.nama}</div>
            <div style={{fontSize:12,color:'#6b2535',marginBottom:1}}>{selP.tempat}</div>
            <div style={{fontSize:12,color:'#6b2535',marginBottom:14}}>{HR[selP.hari]}, {fd(selP.tarikh)}</div>
            {[{l:'Jumlah Hadir',v:recs.length,bg:BGL,col:BG,tc:BGD},...BAH.map((b,i)=>({l:b,v:recs.filter(r=>r.bah===i).length,bg:'#fdf5f6',col:'#1a0810',tc:'#6b2535'}))].map((x,i)=>(
              <div key={i} style={{background:x.bg,borderRadius:9,padding:'9px 12px',marginBottom:7,border:i===0?`1px solid rgba(139,26,46,.2)`:'1px solid #e8d0d5'}}>
                <div style={{fontSize:21,fontWeight:700,color:x.col}}>{x.v}</div>
                <div style={{fontSize:11,color:x.tc}}>{x.l}</div>
              </div>
            ))}
            <button onClick={()=>{setQrSel(selP);goTab('qrkod');}} style={{width:'100%',background:BGL,color:BGD,border:`1px solid rgba(139,26,46,.2)`,borderRadius:8,padding:'8px',cursor:'pointer',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:5,marginTop:4}}>
              <i className="ti ti-qrcode"/>Jana Kod QR
            </button>
          </div>
          {recs.length===0
            ?<div style={{textAlign:'center',padding:'28px',color:'#c4a0a8',border:'1px solid #e8d0d5',borderRadius:10}}>
              <i className="ti ti-users" style={{fontSize:30,display:'block',marginBottom:6}}/>Tiada rekod kehadiran
            </div>
            :<div style={{border:'1px solid #e8d0d5',borderRadius:10,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,tableLayout:'fixed'}}>
                <thead><tr style={{background:'#fdf5f6'}}>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535',width:28}}>#</th>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535'}}>Nama</th>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535',width:90}}>Bahagian</th>
                  <th style={{padding:'7px 10px',textAlign:'right',fontWeight:600,fontSize:11,color:'#6b2535',width:54}}>Masa</th>
                </tr></thead>
                <tbody>{recs.map((r,i)=>(
                  <tr key={r.id} style={{borderTop:i>0?'1px solid #f5e8eb':'none'}}>
                    <td style={{padding:'8px 10px',color:'#c4a0a8',fontSize:11}}>{i+1}</td>
                    <td style={{padding:'8px 10px',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#1a0810'}}>{r.nama}{!r.verified&&<span style={{fontSize:9,color:'#a06070',marginLeft:4}}>(KP sahaja)</span>}</td>
                    <td style={{padding:'8px 10px'}}>{r.bah>=0?<Bdg l={BAH[r.bah]} i={r.bah}/>:<span style={{fontSize:11,color:'#a06070'}}>—</span>}</td>
                    <td style={{padding:'8px 10px',textAlign:'right',color:'#6b2535',fontSize:12}}>{ft(r.masa)}</td>
                  </tr>
                ))}
              </tbody></table>
            </div>
          }
        </div>
      </div>
    );
  };

  const tabProgram=()=>{
    if(sub==='rep'&&selP)return tabProgRep();
    const sorted=[...progs].sort((a,b)=>b.cAt-a.cAt);
    return(
      <div style={{animation:'fadeUp .2s ease',display:'grid',gridTemplateColumns:'290px 1fr',gap:18,alignItems:'start'}}>
        <div style={{background:'#fff',border:'1px solid #e8d0d5',borderRadius:10,padding:16}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:13,paddingBottom:10,borderBottom:'1px solid #f5e8eb',color:'#3D0A18'}}>Tambah Program Baharu</div>
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            <input placeholder="Nama program" value={pfNama} onChange={e=>setPfNama(e.target.value)}/>
            <input placeholder="Tempat" value={pfTempat} onChange={e=>setPfTempat(e.target.value)}/>
            <input type="date" value={pfTarikh} onChange={e=>setPfTarikh(e.target.value)}/>
            <select value={pfHari} onChange={e=>setPfHari(e.target.value)}>
              {HR.map((h,i)=><option key={i} value={i}>{h}</option>)}
            </select>
            {pErr&&<div style={{fontSize:12,color:'#dc2626'}}>{pErr}</div>}
            {pOk&&<div style={{fontSize:12,color:'#0C5A3D',fontWeight:500}}>{pOk}</div>}
            <button onClick={addPr} style={{background:BG,color:'#fff',border:'none',padding:'10px 14px',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <i className="ti ti-plus"/>Tambah Program
            </button>
          </div>
        </div>
        <div>
          {sLbl(`${progs.length} Program`)}
          {sorted.length===0
            ?<div style={{textAlign:'center',padding:'36px',color:'#c4a0a8',border:'1px solid #e8d0d5',borderRadius:10}}>
              <i className="ti ti-calendar" style={{fontSize:34,display:'block',marginBottom:8}}/>Tiada program
            </div>
            :<div style={{border:'1px solid #e8d0d5',borderRadius:10,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,tableLayout:'fixed'}}>
                <thead><tr style={{background:'#fdf5f6'}}>
                  <th style={{padding:'8px 11px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535',width:'27%'}}>Program</th>
                  <th style={{padding:'8px 11px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535',width:'20%'}}>Tempat</th>
                  <th style={{padding:'8px 11px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535',width:'23%'}}>Tarikh</th>
                  <th style={{padding:'8px 11px',textAlign:'center',fontWeight:600,fontSize:11,color:'#6b2535',width:52}}>Hadir</th>
                  <th style={{padding:'8px 11px',width:100}}></th>
                </tr></thead>
                <tbody>{sorted.map((p,i)=>{const cnt=att.filter(a=>a.pId===p.id).length;return(
                  <tr key={p.id} className="hr" style={{borderTop:i>0?'1px solid #f5e8eb':'none'}}>
                    <td style={{padding:'9px 11px',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#1a0810'}}>{p.nama}</td>
                    <td style={{padding:'9px 11px',color:'#6b2535',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.tempat}</td>
                    <td style={{padding:'9px 11px',color:'#6b2535',fontSize:12}}>{HR[p.hari]}, {fds(p.tarikh)}</td>
                    <td style={{padding:'9px 11px',textAlign:'center'}}>
                      <span style={{background:BGL,color:BGD,padding:'2px 9px',borderRadius:99,fontWeight:600,fontSize:12}}>{cnt}</span>
                    </td>
                    <td style={{padding:'7px 9px'}}>
                      <div style={{display:'flex',gap:4,justifyContent:'flex-end'}}>
                        <button onClick={()=>{setQrSel(p);goTab('qrkod');}} style={{background:BGL,border:'none',borderRadius:6,padding:'5px 8px',cursor:'pointer',color:BGD,fontSize:12,display:'flex',alignItems:'center',gap:3,fontWeight:500}}>
                          <i className="ti ti-qrcode"/>QR
                        </button>
                        <button onClick={()=>{setSelP(p);setSub('rep');}} style={{background:'#fdf5f6',border:'none',borderRadius:6,padding:'5px 8px',cursor:'pointer',fontSize:12}}>
                          <i className="ti ti-list"/>
                        </button>
                        <button onClick={()=>delPr(p.id)} style={{background:'none',border:'none',borderRadius:6,padding:'5px 6px',cursor:'pointer',color:'#c4a0a8',fontSize:12}}>
                          <i className="ti ti-trash"/>
                        </button>
                      </div>
                    </td>
                  </tr>
                );})}
              </tbody></table>
            </div>
          }
        </div>
      </div>
    );
  };

  /* ── JANA KOD QR ── */
  const tabQRKod=()=>{
    const sorted=[...progs].sort((a,b)=>b.cAt-a.cAt);
    const selected=qrSel||sorted[0]||null;
    const base=getBaseUrl();
    const qrUrl=selected
      ?`${base}?p=${selected.id}&nm=${encodeURIComponent(selected.nama)}&tp=${encodeURIComponent(selected.tempat)}&dt=${selected.tarikh}&hr=${selected.hari}`
      :'';
    const cnt=selected?att.filter(a=>a.pId===selected.id).length:0;

    if(progs.length===0)return(
      <div style={{textAlign:'center',padding:'60px 0',color:'#c4a0a8',animation:'fadeUp .2s ease'}}>
        <i className="ti ti-qrcode-off" style={{fontSize:48,display:'block',marginBottom:12}}/>
        <div style={{fontSize:16,fontWeight:600,marginBottom:6,color:'#6b2535'}}>Tiada Program</div>
        <div style={{fontSize:14,marginBottom:16,color:'#a06070'}}>Tambah program dahulu.</div>
        <button onClick={()=>goTab('program')} style={{background:BG,color:'#fff',border:'none',padding:'9px 20px',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14,display:'inline-flex',alignItems:'center',gap:6}}>
          <i className="ti ti-plus"/>Tambah Program
        </button>
      </div>
    );

    return(
      <div style={{animation:'fadeUp .2s ease',display:'grid',gridTemplateColumns:'215px 1fr',gap:0,minHeight:420}}>
        {/* Program list */}
        <div style={{borderRight:'1px solid #e8d0d5'}}>
          <div style={{padding:'10px 14px 8px',fontSize:11,fontWeight:600,color:'#6b2535',textTransform:'uppercase',letterSpacing:'.06em',borderBottom:'1px solid #f5e8eb'}}>Pilih Program</div>
          {sorted.map(p=>{
            const isSel=selected?.id===p.id;
            const c2=att.filter(a=>a.pId===p.id).length;
            return(
              <div key={p.id} onClick={()=>setQrSel(p)}
                style={{padding:'11px 14px',cursor:'pointer',borderLeft:`3px solid ${isSel?BG:'transparent'}`,background:isSel?BGL:'transparent',transition:'all .12s',borderBottom:'1px solid #f5e8eb'}}>
                <div style={{fontWeight:isSel?600:500,fontSize:13,color:isSel?BGD:'#1a0810',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.nama}</div>
                <div style={{fontSize:11,color:isSel?BGD:'#a06070',marginBottom:1}}>{HR[p.hari]}, {fds(p.tarikh)}</div>
                <div style={{fontSize:11,color:isSel?BG:'#a06070',fontWeight:isSel?600:400}}>{c2} hadir</div>
              </div>
            );
          })}
        </div>
        {/* QR display */}
        {selected&&(
          <div style={{padding:'0 0 24px 22px'}}>
            <div style={{background:`linear-gradient(135deg,${SIDE} 0%,#6b1020 100%)`,borderRadius:12,padding:'14px 18px',color:'#fff',marginBottom:16}}>
              <div style={{fontSize:9,color:'rgba(255,255,255,.4)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:4}}>{SCHOOL}</div>
              <div style={{fontSize:15,fontWeight:700,marginBottom:5}}>{selected.nama}</div>
              <div style={{display:'flex',gap:12,flexWrap:'wrap',fontSize:12,color:'rgba(255,255,255,.7)'}}>
                <span><i className="ti ti-map-pin" style={{fontSize:11,marginRight:3}}/>{selected.tempat}</span>
                <span><i className="ti ti-calendar" style={{fontSize:11,marginRight:3}}/>{HR[selected.hari]}, {fds(selected.tarikh)}</span>
                <span><i className="ti ti-users" style={{fontSize:11,marginRight:3}}/>{cnt} hadir</span>
              </div>
            </div>
            <div style={{display:'flex',gap:18,alignItems:'flex-start'}}>
              {/* QR box */}
              <div style={{background:'#fff',border:'1px solid #e8d0d5',borderRadius:14,padding:16,textAlign:'center',boxShadow:'0 4px 20px rgba(139,26,46,.08)',flexShrink:0}}>
                <QRGen data={qrUrl} size={195} wrapRef={qrWrapRef}/>
                <div style={{marginTop:10}}>
                  <div style={{fontSize:9,color:'#a06070',marginBottom:3}}>URL Program (boleh diimbas dengan mana-mana kamera)</div>
                  <div style={{fontSize:9,background:'#fdf5f6',padding:'3px 8px',borderRadius:5,color:'#6b2535',wordBreak:'break-all',maxWidth:200,margin:'0 auto',lineHeight:1.4}}>{qrUrl.slice(0,60)}...</div>
                </div>
              </div>
              {/* Info + actions */}
              <div style={{flex:1,minWidth:0}}>
                {/* Key info */}
                <div style={{background:'#fdf5f6',border:'1px solid #e8d0d5',borderRadius:10,padding:'12px 14px',marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:600,color:BGD,marginBottom:3,display:'flex',alignItems:'center',gap:5}}>
                    <i className="ti ti-world" style={{fontSize:13}}/>Imbas dengan Mana-mana Apl
                  </div>
                  <div style={{fontSize:12,color:'#6b2535',lineHeight:1.6}}>
                    Kod QR ini mengandungi URL yang boleh diimbas oleh <strong>kamera telefon</strong>, <strong>WhatsApp</strong>, atau mana-mana apl QR scanner. Laman web pendaftaran akan dibuka secara automatik dengan maklumat program sudah tersedia.
                  </div>
                </div>
                <div style={{background:'#fdf5f6',border:'1px solid #e8d0d5',borderRadius:10,padding:'12px 14px',marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:600,color:BGD,marginBottom:8}}>Cara Penggunaan</div>
                  {[['1','Paparkan atau cetak QR kod ini'],['2','Kakitangan imbas dengan kamera telefon'],['3','Laman web dibuka secara automatik'],['4','Masukkan No. KP untuk daftar hadir']].map(([n,t])=>(
                    <div key={n} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:6}}>
                      <div style={{width:18,height:18,borderRadius:'50%',background:BG,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,flexShrink:0}}>{n}</div>
                      <div style={{fontSize:12,color:'#6b2535',paddingTop:1}}>{t}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <button onClick={()=>downloadQR(selected,qrWrapRef.current,qrUrl)}
                    style={{width:'100%',background:BG,color:'#fff',border:'none',padding:'11px 16px',borderRadius:9,cursor:'pointer',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:7,boxShadow:'0 2px 12px rgba(139,26,46,.25)'}}>
                    <i className="ti ti-download" style={{fontSize:17}}/>Muat Turun QR (PNG)
                  </button>
                  <button onClick={()=>printQR(selected,qrWrapRef.current)}
                    style={{width:'100%',background:'#fff',color:SIDE,border:`1.5px solid ${SIDE}`,padding:'11px 16px',borderRadius:9,cursor:'pointer',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
                    <i className="ti ti-printer" style={{fontSize:17}}/>Cetak Kod QR
                  </button>
                  <button onClick={()=>{setSelP(selected);setSub('rep');setTab('program');}}
                    style={{width:'100%',background:'#fdf5f6',color:'#3D0A18',border:'1px solid #e8d0d5',padding:'9px 16px',borderRadius:9,cursor:'pointer',fontWeight:500,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                    <i className="ti ti-clipboard-list"/>Lihat Senarai Kehadiran
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  /* ── LAPORAN ── */
  const tabLaporan=()=>{
    const cur=repP?progs.find(p=>p.id===repP):null;
    const recs=cur?[...att.filter(a=>a.pId===cur.id)].sort((a,b)=>a.masa-b.masa):[];
    return(
      <div style={{animation:'fadeUp .2s ease'}}>
        <div style={{marginBottom:14}}>
          <select value={repP} onChange={e=>setRepP(e.target.value)} style={{width:'auto',minWidth:300}}>
            <option value="">-- Pilih Program --</option>
            {progs.map(p=><option key={p.id} value={p.id}>{p.nama} · {fds(p.tarikh)}</option>)}
          </select>
        </div>
        {cur&&<div style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:14,alignItems:'start'}}>
          <div>
            <div style={{background:'#fdf5f6',borderRadius:10,padding:12,marginBottom:9,border:'1px solid #e8d0d5'}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:3,color:'#1a0810'}}>{cur.nama}</div>
              <div style={{fontSize:12,color:'#6b2535',marginBottom:1}}>{cur.tempat}</div>
              <div style={{fontSize:12,color:'#6b2535'}}>{HR[cur.hari]}, {fd(cur.tarikh)}</div>
            </div>
            {[{l:'Jumlah',v:recs.length,bg:BGL,col:BG,tc:BGD},...BAH.map((b,i)=>({l:b,v:recs.filter(r=>r.bah===i).length,bg:'#fdf5f6',col:'#1a0810',tc:'#6b2535'}))].map((x,i)=>(
              <div key={i} style={{background:x.bg,borderRadius:9,padding:'9px 12px',marginBottom:7,border:i===0?`1px solid rgba(139,26,46,.2)`:'1px solid #e8d0d5'}}>
                <div style={{fontSize:21,fontWeight:700,color:x.col}}>{x.v}</div>
                <div style={{fontSize:11,color:x.tc}}>{x.l}</div>
              </div>
            ))}
          </div>
          <div style={{border:'1px solid #e8d0d5',borderRadius:10,overflow:'hidden'}}>
            {recs.length===0
              ?<div style={{padding:28,textAlign:'center',color:'#c4a0a8'}}>Tiada rekod kehadiran</div>
              :<table style={{width:'100%',borderCollapse:'collapse',fontSize:13,tableLayout:'fixed'}}>
                <thead><tr style={{background:'#fdf5f6'}}>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535',width:28}}>#</th>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535'}}>Nama / No. KP</th>
                  <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,fontSize:11,color:'#6b2535',width:90}}>Bahagian</th>
                  <th style={{padding:'7px 10px',textAlign:'right',fontWeight:600,fontSize:11,color:'#6b2535',width:52}}>Masa</th>
                </tr></thead>
                <tbody>{recs.map((r,i)=>(
                  <tr key={r.id} className="hr" style={{borderTop:i>0?'1px solid #f5e8eb':'none'}}>
                    <td style={{padding:'8px 10px',color:'#c4a0a8',fontSize:11}}>{i+1}</td>
                    <td style={{padding:'8px 10px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      <div style={{fontWeight:500,color:'#1a0810'}}>{r.nama}</div>
                      <div style={{fontSize:10,color:'#a06070',fontFamily:'monospace'}}>{r.noKP}</div>
                    </td>
                    <td style={{padding:'8px 10px'}}>{r.bah>=0?<Bdg l={BAH[r.bah]} i={r.bah}/>:<span style={{fontSize:11,color:'#a06070'}}>—</span>}</td>
                    <td style={{padding:'8px 10px',textAlign:'right',color:'#6b2535',fontSize:12}}>{ft(r.masa)}</td>
                  </tr>
                ))}
              </tbody></table>
            }
          </div>
        </div>}
        {!cur&&progs.length===0&&<div style={{textAlign:'center',padding:'36px 0',color:'#c4a0a8'}}>
          <i className="ti ti-chart-bar" style={{fontSize:36,display:'block',marginBottom:8}}/>Tiada data laporan
        </div>}
      </div>
    );
  };

  /* ── TETAPAN ── */
  const tabTetapan=()=>(
    <div style={{animation:'fadeUp .2s ease',maxWidth:480}}>
      <div style={{background:'#fff',border:'1px solid #e8d0d5',borderRadius:10,padding:18,marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:4,color:'#1a0810'}}>Tukar PIN Admin</div>
        <div style={{fontSize:13,color:'#a06070',marginBottom:12}}>PIN lalai: <strong>1234</strong></div>
        <div style={{display:'flex',gap:8}}>
          <input type="password" placeholder="PIN baharu (4–8 digit)" value={nPin} maxLength={8} onChange={e=>setNPin(e.target.value.replace(/\D/g,''))} style={{flex:1}}/>
          <button onClick={savePin} style={{background:BG,color:'#fff',border:'none',padding:'9px 14px',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:13,display:'flex',alignItems:'center',gap:5,whiteSpace:'nowrap'}}>
            <i className="ti ti-lock"/>Simpan
          </button>
        </div>
        {pmErr&&<div style={{fontSize:12,color:'#dc2626',marginTop:7}}>{pmErr}</div>}
        {pmOk&&<div style={{fontSize:12,color:'#0C5A3D',marginTop:7,fontWeight:500}}>{pmOk}</div>}
      </div>
      <div style={{background:'#fff',border:'1px solid #e8d0d5',borderRadius:10,padding:18}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:4,color:'#1a0810'}}>Kembali ke Skrin Kakitangan</div>
        <div style={{fontSize:13,color:'#a06070',marginBottom:12}}>Keluar dari panel admin.</div>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:6,background:BGL,color:BGD,border:`1px solid rgba(139,26,46,.2)`,padding:'8px 14px',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:13}}>
          <i className="ti ti-arrow-left"/>Kembali
        </button>
      </div>
    </div>
  );

  const renderTab=()=>{
    switch(tab){
      case 'utama':       return tabUtama();
      case 'kakitangan':  return tabKakitangan();
      case 'program':     return tabProgram();
      case 'qrkod':       return tabQRKod();
      case 'laporan':     return tabLaporan();
      case 'tetapan':     return tabTetapan();
      default:            return tabUtama();
    }
  };

  const NAVS=[
    {id:'utama',     ic:'layout-dashboard', l:'Papan Pemuka'},
    {id:'kakitangan',ic:'users',            l:'Kakitangan'},
    {id:'program',   ic:'calendar',         l:'Program'},
    {id:'qrkod',     ic:'qrcode',           l:'Jana Kod QR'},
    {id:'laporan',   ic:'chart-bar',        l:'Laporan'},
    {id:'tetapan',   ic:'settings',         l:'Tetapan'},
  ];
  const hdrTitle=sub==='rep'?`Kehadiran — ${selP?.nama||''}`:{utama:'Papan Pemuka',kakitangan:'Kakitangan',program:'Program',qrkod:'Jana Kod QR',laporan:'Laporan',tetapan:'Tetapan'}[tab];

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div style={{width:196,flexShrink:0,background:SIDE,display:'flex',flexDirection:'column',minHeight:'100vh'}}>
        <div style={{padding:'16px 14px 13px',borderBottom:'1px solid rgba(255,255,255,.07)'}}>
          <div style={{fontSize:9,color:'rgba(255,255,255,.3)',letterSpacing:'.07em',textTransform:'uppercase'}}>{SCHOOL}</div>
          <div style={{fontSize:12,fontWeight:600,color:'#fff',marginTop:2,lineHeight:1.3}}>Sistem Kehadiran Program</div>
          <div style={{marginTop:7,display:'inline-flex',alignItems:'center',gap:4,background:'rgba(255,255,255,.1)',borderRadius:5,padding:'3px 7px'}}>
            <i className="ti ti-shield-check" style={{fontSize:10,color:'rgba(255,255,255,.55)'}}/>
            <span style={{fontSize:10,color:'rgba(255,255,255,.55)',fontWeight:600}}>ADMIN</span>
          </div>
        </div>
        <div style={{padding:'9px 7px',flex:1}}>
          {NAVS.map(n=>(
            <button key={n.id} className="ni" onClick={()=>goTab(n.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:8,background:tab===n.id?(n.id==='qrkod'?`rgba(139,26,46,.4)`:'rgba(255,255,255,.12)'):'none',border:'none',borderRadius:7,padding:'9px 10px',cursor:'pointer',marginBottom:2,color:tab===n.id?'#fff':'rgba(255,255,255,.45)',textAlign:'left',fontSize:13,fontWeight:tab===n.id?600:400,borderLeft:tab===n.id?`2px solid ${BG}`:'2px solid transparent'}}>
              <i className={`ti ti-${n.ic}`} style={{fontSize:17,flexShrink:0}}/>
              <span style={{flex:1}}>{n.l}</span>
              {n.id==='qrkod'&&<span style={{background:BG,color:'#fff',fontSize:9,fontWeight:700,padding:'1px 5px',borderRadius:99}}>QR</span>}
            </button>
          ))}
        </div>
        <div style={{padding:'9px 7px',borderTop:'1px solid rgba(255,255,255,.06)'}}>
          <button className="ni" onClick={onBack} style={{width:'100%',display:'flex',alignItems:'center',gap:8,background:'none',border:'none',borderRadius:7,padding:'8px 10px',cursor:'pointer',color:'rgba(255,255,255,.3)',fontSize:12}}>
            <i className="ti ti-arrow-left" style={{fontSize:15}}/>Keluar Admin
          </button>
        </div>
      </div>
      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'11px 20px',borderBottom:'1px solid #e8d0d5',background:'#fff',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:14,fontWeight:600,color:'#1a0810'}}>{hdrTitle}</div>
          <div style={{fontSize:11,color:'#a06070'}}>{new Date().toLocaleDateString('ms-MY',{day:'2-digit',month:'short',year:'numeric'})}</div>
        </div>
        <div style={{padding:'18px 20px 32px',flex:1,overflowY:'auto'}}>{renderTab()}</div>
      </div>
    </div>
  );
}

/* ════════════════════════
   ROOT
════════════════════════ */
function App(){
  const [mode,setMode]=useState(null); // null=loading | 'kakitangan' | 'admin' | 'pin' | 'direct'
  const [staff,setStaff]=useState([]);
  const [progs,setProgs]=useState([]);
  const [att,setAtt]=useState([]);
  const [pin,setPin]=useState(DEF_PIN);
  const [pinIn,setPinIn]=useState('');
  const [pinErr,setPinErr]=useState('');
  const [directProg,setDirectProg]=useState(null);

  useEffect(()=>{
    (async()=>{
      await ld(SK.ST,setStaff);await ld(SK.PR,setProgs);await ld(SK.AT,setAtt);
      try{const v=localStorage.getItem(SK.PIN);if(v)setPin(JSON.parse(v));}catch{}
      // Check URL params for direct attendance
      const dp=getProgramFromURL();
      if(dp&&dp.id){
        setDirectProg(dp);
        setMode('direct');
      }else{
        setMode('kakitangan');
      }
    })();
  },[]);

  const svSt=async d=>{setStaff(d);await sv(SK.ST,d);};
  const svPr=async d=>{setProgs(d);await sv(SK.PR,d);};
  const svAt=async d=>{setAtt(d);await sv(SK.AT,d);};
  const updPin=async p=>{setPin(p);await sv(SK.PIN,p);};

  const tryAdmin=()=>{
    if(pinIn===pin){setPinIn('');setPinErr('');setMode('admin');}
    else{setPinErr('PIN tidak sah. Cuba lagi.');setPinIn('');}
  };

  if(mode===null)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',flexDirection:'column',gap:12}}>
      <div style={{width:32,height:32,border:`3px solid ${BG}`,borderTopColor:'transparent',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>
      <span style={{color:'#a06070',fontSize:14}}>Memuatkan sistem...</span>
    </div>
  );

  /* Direct attendance via URL (scanned with any camera app) */
  if(mode==='direct'&&directProg)return(
    <div style={{minHeight:'100vh',background:'#fff'}}>
      <div style={{background:SIDE,padding:'14px 18px 13px'}}>
        <div style={{fontSize:9,color:'rgba(255,255,255,.4)',letterSpacing:'.07em',textTransform:'uppercase'}}>{SCHOOL}</div>
        <div style={{fontSize:16,fontWeight:700,color:'#fff',marginTop:1}}>Daftar Kehadiran</div>
      </div>
      <AttendanceForm
        prog={directProg} staff={staff} att={att} svAt={svAt}
        onBack={()=>{window.history.replaceState({},'',window.location.pathname);setMode('kakitangan');}}
        onDone={()=>{/* Reset IC for next person */setPinIn('');}}
      />
    </div>
  );

  /* Admin PIN entry */
  if(mode==='pin')return(
    <div style={{minHeight:'100vh',background:'#f7f2f3',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:20,padding:'28px 24px',maxWidth:380,width:'100%',boxShadow:'0 8px 40px rgba(139,26,46,.12)',border:'1px solid #e8d0d5'}}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <div style={{width:54,height:54,borderRadius:14,background:BGL,color:BG,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,margin:'0 auto 12px'}}>
            <i className="ti ti-shield-lock"/>
          </div>
          <div style={{fontWeight:700,fontSize:18,color:'#1a0810',marginBottom:3}}>Log Masuk Admin</div>
          <div style={{fontSize:13,color:'#a06070'}}>Masukkan PIN untuk akses panel admin</div>
        </div>
        <input type="password" inputMode="numeric" placeholder="Masukkan PIN"
          value={pinIn} maxLength={8}
          onChange={e=>{setPinIn(e.target.value.replace(/\D/g,''));setPinErr('');}}
          onKeyDown={e=>e.key==='Enter'&&tryAdmin()}
          style={{fontSize:26,padding:'14px 16px',borderRadius:13,border:`2px solid ${pinErr?'#dc2626':'#e8d0d5'}`,background:'#fdf8f9',textAlign:'center',letterSpacing:6,marginBottom:10}}/>
        {pinErr&&<div style={{fontSize:13,color:'#dc2626',textAlign:'center',marginBottom:10}}>{pinErr}</div>}
        <button onClick={tryAdmin} style={{width:'100%',background:BG,color:'#fff',border:'none',padding:'13px',borderRadius:11,cursor:'pointer',fontWeight:700,fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:7,boxShadow:'0 3px 16px rgba(139,26,46,.3)',marginBottom:10}}>
          <i className="ti ti-login"/>Log Masuk
        </button>
        <button onClick={()=>{setMode('kakitangan');setPinIn('');setPinErr('');}} style={{width:'100%',background:'none',border:'none',color:'#a06070',padding:'9px',cursor:'pointer',fontSize:13}}>
          Kembali
        </button>
        <div style={{fontSize:11,color:'#c4a0a8',textAlign:'center',marginTop:6}}>PIN lalai: <strong>1234</strong></div>
      </div>
    </div>
  );

  /* Admin panel */
  if(mode==='admin')return(
    <AdminPanel staff={staff} progs={progs} att={att} svSt={svSt} svPr={svPr} svAt={svAt}
      pin={pin} setPin={updPin} onBack={()=>setMode('kakitangan')}/>
  );

  /* Kakitangan view (default) */
  return(
    <KakitanganView staff={staff} progs={progs} att={att} svAt={svAt}
      onAdmin={()=>{setPinIn('');setPinErr('');setMode('pin');}}/>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
